<!DOCTYPE html>
<html lang="es" data-theme="caballeros" data-mode="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sin conexion — CitaClick</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{min-height:100dvh;display:flex;align-items:center;justify-content:center;font-family:'DM Sans',system-ui,sans-serif;background:#F5F5F5;color:#1A1A2E;padding:2rem;text-align:center}
    .offline-container{max-width:360px}
    .offline-logo{font-family:Georgia,serif;font-size:2rem;font-weight:700;margin-bottom:2rem;letter-spacing:-0.03em}
    .offline-logo span{color:#E8000D}
    .offline-icon{width:64px;height:64px;margin:0 auto 1.5rem;color:#D8D8E4}
    .offline-title{font-size:1.25rem;font-weight:600;margin-bottom:0.5rem}
    .offline-text{color:#8888A0;font-size:0.9375rem;line-height:1.6}
  </style>
</head>
<body>
  <div class="offline-container">
    <div class="offline-logo">cita<span>click</span></div>
    <svg class="offline-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="1" y1="1" x2="23" y2="23"/>
      <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
      <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
      <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
      <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
      <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
      <line x1="12" y1="20" x2="12.01" y2="20"/>
    </svg>
    <h1 class="offline-title">Sin conexion</h1>
    <p class="offline-text">Tus datos se sincronizaran automaticamente cuando vuelvas a estar en linea.</p>
  </div>
</body>
</html>
