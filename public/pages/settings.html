<div class="page-header">
  <h2 class="page-title" data-i18n="nav.settings">Configuracion</h2>
</div>

<div class="settings-tabs">
  <button class="settings-tab active" data-tab="profile" data-i18n="settings.profile">Perfil</button>
  <button class="settings-tab" data-tab="appearance" data-i18n="settings.appearance">Apariencia</button>
  <button class="settings-tab" data-tab="schedules" data-i18n="settings.schedules">Horarios</button>
  <button class="settings-tab" data-tab="notifications" data-i18n="settings.notifications">Notificaciones</button>
  <button class="settings-tab" data-tab="plan" data-i18n="settings.plan">Plan</button>
  <button class="settings-tab" data-tab="currency" data-i18n="settings.currency">Moneda</button>
</div>

<div class="settings-panel active" id="tab-profile">
  <div class="card">
    <form id="profile-form" novalidate>
      <div class="form-group">
        <label class="form-label" data-i18n="settings.logo">Logo</label>
        <input class="form-input" type="file" id="setting-logo" accept="image/*">
      </div>
      <div class="form-group">
        <label class="form-label" data-i18n="auth.business_name">Nombre del negocio</label>
        <input class="form-input" type="text" id="setting-name">
      </div>
      <div class="form-group">
        <label class="form-label" data-i18n="settings.description">Descripcion</label>
        <textarea class="form-input" id="setting-description" rows="3"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label" data-i18n="settings.address">Direccion</label>
        <input class="form-input" type="text" id="setting-address">
      </div>
      <div class="form-group">
        <label class="form-label" data-i18n="settings.phone">Telefono</label>
        <input class="form-input" type="tel" id="setting-phone">
      </div>
      <div class="form-group">
        <label class="form-label" data-i18n="settings.google_maps">Enlace Google Maps</label>
        <input class="form-input" type="url" id="setting-maps">
      </div>
      <div class="form-group">
        <label class="form-label" data-i18n="settings.instagram">Instagram</label>
        <input class="form-input" type="text" id="setting-instagram" placeholder="@usuario">
      </div>
      <div class="form-group">
        <label class="form-label" data-i18n="settings.facebook">Facebook</label>
        <input class="form-input" type="url" id="setting-facebook">
      </div>
      <button type="submit" class="btn btn-primary" data-i18n="common.save">Guardar</button>
    </form>
  </div>
</div>

<div class="settings-panel" id="tab-appearance">
  <div class="card">
    <div class="form-group">
      <label class="form-label" data-i18n="settings.theme">Tema</label>
      <div class="flex gap-4 mt-2">
        <button class="btn btn-secondary" id="btn-theme-cab" onclick="App.setTheme('caballeros')" data-i18n="auth.theme_caballeros">Caballeros</button>
        <button class="btn btn-secondary" id="btn-theme-dam" onclick="App.setTheme('damas')" data-i18n="auth.theme_damas">Damas</button>
      </div>
    </div>
    <div class="form-group mt-4">
      <label class="form-label" data-i18n="settings.dark_mode">Modo oscuro</label>
      <div class="form-check mt-2">
        <input type="checkbox" id="setting-darkmode" onchange="App.setMode(this.checked ? 'dark' : 'light')">
        <label for="setting-darkmode" data-i18n="settings.dark_mode">Modo oscuro</label>
      </div>
    </div>
    <div class="form-group mt-4">
      <label class="form-label" data-i18n="settings.language">Idioma</label>
      <select class="form-input" id="setting-lang" onchange="i18n.setLocale(this.value)" style="max-width:200px;">
        <option value="es">Espanol</option>
        <option value="en">English</option>
      </select>
    </div>
  </div>
</div>

<div class="settings-panel" id="tab-schedules">
  <div class="card">
    <h3 class="card-title mb-4" data-i18n="settings.working_hours">Horario de atencion</h3>
    <p class="text-sm text-muted mb-4">Configura los dias y horas de atencion. Los clientes podran agendar citas dentro de estos horarios.</p>
    <div id="schedule-form" class="schedule-grid"></div>
    <button class="btn btn-primary mt-4" id="btn-save-schedule" data-i18n="common.save">Guardar</button>
  </div>
</div>

<div class="settings-panel" id="tab-notifications">
  <div class="card">
    <div class="form-group">
      <div class="form-check">
        <input type="checkbox" id="setting-whatsapp-enabled" checked>
        <label for="setting-whatsapp-enabled" data-i18n="settings.whatsapp_notifications">Notificaciones por WhatsApp</label>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label" data-i18n="settings.whatsapp_number">Numero de WhatsApp</label>
      <input class="form-input" type="tel" id="setting-whatsapp-num" style="max-width:300px;">
    </div>
    <div class="form-group mt-4">
      <div class="form-check">
        <input type="checkbox" id="setting-email-enabled" checked>
        <label for="setting-email-enabled" data-i18n="settings.email_notifications">Notificaciones por correo</label>
      </div>
    </div>
    <button class="btn btn-primary mt-4" data-i18n="common.save">Guardar</button>
  </div>
</div>

<div class="settings-panel" id="tab-plan">
  <div class="card">
    <h3 class="card-title mb-4" data-i18n="settings.current_plan">Plan actual</h3>
    <div id="current-plan-info"></div>
  </div>
</div>

<div class="settings-panel" id="tab-currency">
  <div class="card">
    <div class="form-group">
      <label class="form-label" data-i18n="settings.local_currency">Moneda local</label>
      <input class="form-input" type="text" id="setting-currency" placeholder="VES, COP, MXN..." style="max-width:200px;">
    </div>
    <div class="form-group">
      <label class="form-label" data-i18n="settings.price_mode">Modo de precios</label>
      <select class="form-input" id="setting-price-mode" style="max-width:250px;">
        <option value="usd" data-i18n="settings.price_usd">Solo USD</option>
        <option value="local" data-i18n="settings.price_local">Solo moneda local</option>
        <option value="both" data-i18n="settings.price_both">Ambas</option>
      </select>
    </div>
    <button class="btn btn-primary mt-4" data-i18n="common.save">Guardar</button>
  </div>
</div>

<footer class="site-footer">
  Desarrollado por <a href="https://www.herasi.dev" target="_blank" rel="noopener noreferrer">@herasi.dev</a>
</footer>

<style>
  .settings-tabs {
    display: flex;
    gap: 2px;
    background: var(--color-surface-sunken);
    border-radius: var(--radius-lg);
    padding: 3px;
    margin-bottom: var(--space-6);
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }

  .settings-tab {
    padding: var(--space-2) var(--space-4);
    font-size: var(--text-sm);
    font-weight: var(--weight-medium);
    color: var(--color-text-muted);
    border-radius: calc(var(--radius-lg) - 3px);
    white-space: nowrap;
    transition: all var(--transition-fast);
    background: transparent;
    border: none;
    cursor: pointer;
  }

  .settings-tab:hover { color: var(--color-text); }

  .settings-tab.active {
    background: var(--color-surface-raised);
    color: var(--color-text);
    box-shadow: var(--shadow-xs);
    font-weight: var(--weight-semibold);
  }

  .settings-panel { display: none; }
  .settings-panel.active { display: block; }

  .schedule-grid {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .schedule-row {
    display: flex;
    align-items: center;
    gap: var(--space-3);
    padding: var(--space-3);
    background: var(--color-surface);
    border-radius: var(--radius-md);
    flex-wrap: wrap;
  }

  .schedule-row.disabled {
    opacity: 0.4;
  }

  .schedule-toggle {
    display: flex;
    align-items: center;
    gap: var(--space-2);
    min-width: 120px;
    font-size: var(--text-sm);
    font-weight: var(--weight-medium);
    cursor: pointer;
  }

  .schedule-toggle input {
    width: 18px;
    height: 18px;
    accent-color: var(--color-highlight);
  }

  .schedule-times {
    display: flex;
    align-items: center;
    gap: var(--space-2);
    flex: 1;
  }

  .schedule-times input[type="time"] {
    padding: var(--space-2);
    border: 1px solid var(--color-input-border);
    border-radius: var(--radius-sm);
    background: var(--color-input-bg);
    color: var(--color-text);
    font-size: var(--text-sm);
    min-width: 0;
    flex: 1;
    max-width: 120px;
  }

  .schedule-times .sep {
    color: var(--color-text-muted);
    font-size: var(--text-sm);
  }

  .schedule-slot {
    display: flex;
    align-items: center;
    gap: var(--space-1);
    font-size: var(--text-xs);
    color: var(--color-text-muted);
  }

  .schedule-slot input {
    width: 50px;
    padding: var(--space-1) var(--space-2);
    border: 1px solid var(--color-input-border);
    border-radius: var(--radius-sm);
    background: var(--color-input-bg);
    color: var(--color-text);
    font-size: var(--text-sm);
    text-align: center;
  }

  .schedule-break {
    display: flex;
    align-items: center;
    gap: var(--space-2);
    margin-top: var(--space-2);
    padding-left: 120px;
    font-size: var(--text-xs);
    color: var(--color-text-muted);
  }

  .schedule-break.hidden { display: none; }

  .schedule-break label {
    display: flex;
    align-items: center;
    gap: var(--space-1);
    cursor: pointer;
    white-space: nowrap;
  }

  .schedule-break input[type="checkbox"] {
    width: 14px;
    height: 14px;
    accent-color: var(--color-highlight);
  }

  .schedule-break input[type="time"] {
    padding: var(--space-1);
    border: 1px solid var(--color-input-border);
    border-radius: var(--radius-sm);
    background: var(--color-input-bg);
    color: var(--color-text);
    font-size: var(--text-xs);
    max-width: 100px;
  }

  .break-times { display: flex; align-items: center; gap: var(--space-1); }
  .break-times.inactive { opacity: 0.3; pointer-events: none; }

  @media (max-width: 639px) {
    .schedule-break {
      padding-left: 0;
    }
  }

  @media (max-width: 375px) {
    .schedule-row {
      padding: var(--space-2);
      gap: var(--space-2);
    }

    .schedule-toggle {
      min-width: 100px;
      font-size: var(--text-xs);
    }

    .schedule-times input[type="time"] {
      max-width: 90px;
    }
  }
</style>

<script>
  (function () {
    document.querySelectorAll('.settings-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.settings-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.settings-panel').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
      });
    });

    document.getElementById('setting-darkmode').checked = App.getMode() === 'dark';
    document.getElementById('setting-lang').value = i18n.getLocale();

    async function loadProfile() {
      const res = await Api.get('/business/profile');
      if (!res.success || !res.data) return;
      const b = res.data;
      document.getElementById('setting-name').value = b.name || '';
      document.getElementById('setting-description').value = b.description || '';
      document.getElementById('setting-address').value = b.address || '';
      document.getElementById('setting-phone').value = b.phone || '';
      document.getElementById('setting-maps').value = b.google_maps_url || '';
      document.getElementById('setting-instagram').value = b.instagram || '';
      document.getElementById('setting-facebook').value = b.facebook || '';
    }

    document.getElementById('profile-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = {
        name: document.getElementById('setting-name').value.trim(),
        description: document.getElementById('setting-description').value.trim(),
        address: document.getElementById('setting-address').value.trim(),
        phone: document.getElementById('setting-phone').value.trim(),
        google_maps_url: document.getElementById('setting-maps').value.trim(),
        instagram: document.getElementById('setting-instagram').value.trim(),
        facebook: document.getElementById('setting-facebook').value.trim(),
      };
      const res = await Api.put('/business/profile', data);
      if (res.success) showToast(i18n.t('common.success'), 'success');
    });

    // --- SCHEDULE TAB ---
    var dayNames = i18n.getLocale() === 'es'
      ? ['Lunes','Martes','Miercoles','Jueves','Viernes','Sabado','Domingo']
      : ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];

    var currentProviderId = null;

    async function loadSchedule() {
      // Get current user's provider
      var pRes = await Api.get('/providers');
      if (!pRes.success || !pRes.data || pRes.data.length === 0) return;
      var user = Auth.getUser();
      var provider = pRes.data.find(function(p) { return p.user_id == user.id; }) || pRes.data[0];
      currentProviderId = provider.id;

      var sRes = await Api.get('/providers/' + provider.id + '/schedule');
      var schedules = sRes.success ? sRes.data : [];
      buildScheduleForm(schedules);
    }

    function buildScheduleForm(schedules) {
      var container = document.getElementById('schedule-form');
      container.textContent = '';

      for (var d = 1; d <= 7; d++) {
        // Find all blocks for this day (may be 2 if there's a break)
        var dayBlocks = schedules.filter(function(s) { return s.day_of_week == d; });
        var hasBreak = dayBlocks.length >= 2;
        var block1 = dayBlocks[0] || null;
        var block2 = dayBlocks[1] || null;

        var isActive = block1 ? (block1.is_available == 1) : (d <= 6);
        var startTime = block1 ? block1.start_time : '08:00';
        var endTime = hasBreak ? block2.end_time : (block1 ? block1.end_time : '18:00');
        var breakStart = hasBreak ? block1.end_time : '12:00';
        var breakEnd = hasBreak ? block2.start_time : '14:00';
        var slotMin = block1 ? (block1.slot_minutes || 30) : 30;

        // Wrapper for day row + break row
        var wrapper = document.createElement('div');
        wrapper.className = 'schedule-day-wrapper';
        wrapper.dataset.dow = d;

        var row = document.createElement('div');
        row.className = 'schedule-row' + (isActive ? '' : ' disabled');

        // Toggle + day name
        var toggle = document.createElement('label');
        toggle.className = 'schedule-toggle';
        var chk = document.createElement('input');
        chk.type = 'checkbox';
        chk.checked = isActive;
        chk.className = 'sched-active';
        chk.addEventListener('change', (function(r, br) {
          return function() {
            r.classList.toggle('disabled', !this.checked);
            br.classList.toggle('hidden', !this.checked);
          };
        })(row, null)); // will set breakRow ref below
        toggle.appendChild(chk);
        toggle.appendChild(document.createTextNode(dayNames[d - 1]));

        // Time inputs
        var times = document.createElement('div');
        times.className = 'schedule-times';
        var startInput = document.createElement('input');
        startInput.type = 'time'; startInput.value = startTime.substring(0, 5); startInput.className = 'sched-start';
        var sep = document.createElement('span'); sep.className = 'sep'; sep.textContent = 'a';
        var endInput = document.createElement('input');
        endInput.type = 'time'; endInput.value = endTime.substring(0, 5); endInput.className = 'sched-end';
        times.appendChild(startInput); times.appendChild(sep); times.appendChild(endInput);

        // Slot duration
        var slot = document.createElement('div');
        slot.className = 'schedule-slot';
        var slotInput = document.createElement('input');
        slotInput.type = 'number'; slotInput.value = slotMin; slotInput.min = 5; slotInput.step = 5; slotInput.className = 'sched-slot';
        slot.appendChild(slotInput); slot.appendChild(document.createTextNode('min'));

        row.appendChild(toggle); row.appendChild(times); row.appendChild(slot);

        // Break row
        var breakRow = document.createElement('div');
        breakRow.className = 'schedule-break' + (isActive ? '' : ' hidden');

        var breakLabel = document.createElement('label');
        var breakChk = document.createElement('input');
        breakChk.type = 'checkbox'; breakChk.checked = hasBreak; breakChk.className = 'break-active';
        breakLabel.appendChild(breakChk);
        breakLabel.appendChild(document.createTextNode('Descanso'));

        var breakTimes = document.createElement('div');
        breakTimes.className = 'break-times' + (hasBreak ? '' : ' inactive');
        var bStart = document.createElement('input');
        bStart.type = 'time'; bStart.value = breakStart.substring(0, 5); bStart.className = 'break-start';
        var bSep = document.createElement('span'); bSep.textContent = 'a'; bSep.style.margin = '0 2px';
        var bEnd = document.createElement('input');
        bEnd.type = 'time'; bEnd.value = breakEnd.substring(0, 5); bEnd.className = 'break-end';
        breakTimes.appendChild(bStart); breakTimes.appendChild(bSep); breakTimes.appendChild(bEnd);

        breakChk.addEventListener('change', (function(bt) {
          return function() { bt.classList.toggle('inactive', !this.checked); };
        })(breakTimes));

        breakRow.appendChild(breakLabel); breakRow.appendChild(breakTimes);

        // Fix the chk change handler to reference breakRow
        chk.addEventListener('change', (function(r, br) {
          return function() {
            r.classList.toggle('disabled', !this.checked);
            br.classList.toggle('hidden', !this.checked);
          };
        })(row, breakRow));

        wrapper.appendChild(row);
        wrapper.appendChild(breakRow);
        container.appendChild(wrapper);
      }
    }

    document.getElementById('btn-save-schedule').addEventListener('click', async function() {
      if (!currentProviderId) { showToast('No se encontro prestador', 'error'); return; }

      var schedules = [];
      document.querySelectorAll('#schedule-form .schedule-day-wrapper').forEach(function(wrapper) {
        var dow = parseInt(wrapper.dataset.dow, 10);
        var row = wrapper.querySelector('.schedule-row');
        var isActive = row.querySelector('.sched-active').checked;
        var start = row.querySelector('.sched-start').value;
        var end = row.querySelector('.sched-end').value;
        var slotMin = parseInt(row.querySelector('.sched-slot').value, 10) || 30;
        var hasBreak = wrapper.querySelector('.break-active').checked;

        if (hasBreak && isActive) {
          var breakStart = wrapper.querySelector('.break-start').value;
          var breakEnd = wrapper.querySelector('.break-end').value;
          // Block 1: morning (start -> breakStart)
          schedules.push({
            day_of_week: dow, start_time: start, end_time: breakStart,
            slot_minutes: slotMin, is_available: 1,
          });
          // Block 2: afternoon (breakEnd -> end)
          schedules.push({
            day_of_week: dow, start_time: breakEnd, end_time: end,
            slot_minutes: slotMin, is_available: 1,
          });
        } else {
          schedules.push({
            day_of_week: dow, start_time: start, end_time: end,
            slot_minutes: slotMin, is_available: isActive ? 1 : 0,
          });
        }
      });

      var res = await Api.put('/providers/' + currentProviderId + '/schedule', { schedules: schedules });
      if (res.success) showToast('Horario guardado', 'success');
    });

    loadProfile();
    loadSchedule();
  })();
</script>
