<!-- Page Header -->
<div class="cat-header">
  <div class="cat-header-left">
    <a href="/services" data-link class="cat-back" aria-label="Volver">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </a>
    <div>
      <h2 class="cat-title">Categorias</h2>
      <p class="cat-subtitle" id="cat-subtitle"></p>
    </div>
  </div>
  <button class="btn btn-primary" id="btn-new-cat">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    <span>Nueva categoria</span>
  </button>
</div>

<!-- Table (desktop) -->
<div class="cat-table-card" id="cat-table-card" style="display:none">
  <table class="cat-table">
    <thead>
      <tr>
        <th style="width:50px">#</th>
        <th>Nombre</th>
        <th style="width:120px">Servicios</th>
        <th style="width:120px">Acciones</th>
      </tr>
    </thead>
    <tbody id="cat-tbody"></tbody>
  </table>
</div>

<!-- Mobile cards -->
<div class="cat-cards" id="cat-cards"></div>

<!-- Empty state -->
<div class="cat-empty" id="cat-empty" style="display:none">
  <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="var(--color-text-muted)" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
  <h3 class="cat-empty-title">No hay categorias</h3>
  <p class="cat-empty-desc">Crea categorias para organizar tus servicios en el catalogo.</p>
  <button class="btn btn-primary" id="btn-new-cat-empty">Nueva categoria</button>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-category">
  <div class="modal" style="max-width:420px">
    <div class="modal-header">
      <h3 class="modal-title" id="cat-modal-title">Nueva categoria</h3>
      <button class="modal-close" onclick="closeModal('modal-category')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <form id="cat-form" novalidate>
        <div class="form-group">
          <label class="form-label">Nombre de la categoria <span style="color:var(--color-error)">*</span></label>
          <input class="form-input" type="text" id="cat-name" required maxlength="100" placeholder="Ej: Cortes, Coloracion, Tratamientos...">
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('modal-category')">Cancelar</button>
      <button class="btn btn-primary" id="btn-save-cat">Guardar</button>
    </div>
  </div>
</div>

<style>
  .cat-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--space-3);
    margin-bottom: var(--space-5);
  }

  .cat-header-left {
    display: flex;
    align-items: center;
    gap: var(--space-3);
  }

  .cat-back {
    color: var(--color-text-muted);
    transition: color var(--transition-fast);
  }

  .cat-back:hover { color: var(--color-text); }

  .cat-title {
    font-family: var(--font-display);
    font-size: var(--text-xl);
    font-weight: var(--weight-bold);
    letter-spacing: -0.02em;
  }

  .cat-subtitle {
    font-size: var(--text-xs);
    color: var(--color-text-muted);
    margin-top: 2px;
  }

  .cat-table-card {
    background: var(--color-surface-raised);
    border: 1px solid var(--color-border-light);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }

  .cat-table {
    width: 100%;
    border-collapse: collapse;
  }

  .cat-table th {
    text-align: left;
    padding: var(--space-3) var(--space-4);
    font-size: var(--text-xs);
    font-weight: var(--weight-semibold);
    color: var(--color-text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    border-bottom: 1px solid var(--color-border-light);
  }

  .cat-table td {
    padding: var(--space-3) var(--space-4);
    font-size: var(--text-sm);
    border-bottom: 1px solid var(--color-border-light);
    vertical-align: middle;
  }

  .cat-table tr:last-child td { border-bottom: none; }

  .cat-table tr:hover td {
    background: color-mix(in srgb, var(--color-highlight) 4%, transparent);
  }

  .cat-name-cell {
    font-weight: var(--weight-medium);
  }

  .cat-count-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 24px;
    padding: 2px 8px;
    border-radius: var(--radius-full);
    font-size: var(--text-xs);
    font-weight: var(--weight-semibold);
    background: var(--color-surface-sunken);
    color: var(--color-text-secondary);
  }

  .cat-actions {
    display: flex;
    gap: var(--space-1);
  }

  .cat-action-btn {
    padding: var(--space-1);
    border: none;
    background: none;
    color: var(--color-text-muted);
    cursor: pointer;
    border-radius: var(--radius-md);
    transition: all var(--transition-fast);
  }

  .cat-action-btn:hover {
    background: var(--color-surface-sunken);
    color: var(--color-text);
  }

  .cat-action-btn.danger:hover {
    background: color-mix(in srgb, var(--color-error) 10%, transparent);
    color: var(--color-error);
  }

  /* Mobile cards */
  .cat-cards { display: none; }

  .cat-card {
    background: var(--color-surface-raised);
    border: 1px solid var(--color-border-light);
    border-radius: var(--radius-lg);
    padding: var(--space-4);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--space-3);
    margin-bottom: var(--space-2);
  }

  .cat-card-info {
    flex: 1;
    min-width: 0;
  }

  .cat-card-name {
    font-weight: var(--weight-medium);
    font-size: var(--text-sm);
  }

  .cat-card-count {
    font-size: var(--text-xs);
    color: var(--color-text-muted);
    margin-top: 2px;
  }

  .cat-empty {
    text-align: center;
    padding: var(--space-8) var(--space-4);
  }

  .cat-empty svg { margin: 0 auto var(--space-4); opacity: 0.5; }

  .cat-empty-title {
    font-family: var(--font-display);
    font-size: var(--text-lg);
    font-weight: var(--weight-semibold);
    margin-bottom: var(--space-2);
  }

  .cat-empty-desc {
    font-size: var(--text-sm);
    color: var(--color-text-muted);
    margin-bottom: var(--space-5);
  }

  @media (max-width: 639px) {
    .cat-table-card { display: none !important; }
    .cat-cards { display: block; }
    .cat-header .btn span { display: none; }
    .cat-header .btn { padding: var(--space-2); }
  }

  @media (min-width: 640px) {
    .cat-cards { display: none !important; }
    .cat-title { font-size: var(--text-2xl); }
  }
</style>

<script>
(function() {
  var editingId = null;

  function createSvg(pathD) {
    var ns = 'http://www.w3.org/2000/svg';
    var svg = document.createElementNS(ns, 'svg');
    svg.setAttribute('viewBox', '0 0 24 24');
    svg.setAttribute('width', '16');
    svg.setAttribute('height', '16');
    svg.setAttribute('fill', 'none');
    svg.setAttribute('stroke', 'currentColor');
    svg.setAttribute('stroke-width', '2');
    svg.setAttribute('stroke-linecap', 'round');
    svg.setAttribute('stroke-linejoin', 'round');
    pathD.forEach(function(d) {
      var path = document.createElementNS(ns, 'path');
      path.setAttribute('d', d);
      svg.appendChild(path);
    });
    return svg;
  }

  async function loadCategories() {
    var res = await Api.get('/service-categories');
    var tbody = document.getElementById('cat-tbody');
    var cards = document.getElementById('cat-cards');
    var tableCard = document.getElementById('cat-table-card');
    var emptyEl = document.getElementById('cat-empty');
    var subtitle = document.getElementById('cat-subtitle');

    tbody.textContent = '';
    cards.textContent = '';

    if (!res.success || !res.data || res.data.length === 0) {
      tableCard.style.display = 'none';
      emptyEl.style.display = '';
      subtitle.textContent = '0 categorias';
      return;
    }

    var data = res.data;
    tableCard.style.display = '';
    emptyEl.style.display = 'none';
    subtitle.textContent = data.length + ' categoria' + (data.length !== 1 ? 's' : '');

    data.forEach(function(cat, i) {
      var count = parseInt(cat.service_count) || 0;

      // Desktop table row
      var tr = document.createElement('tr');

      var tdNum = document.createElement('td');
      tdNum.textContent = i + 1;
      tdNum.style.color = 'var(--color-text-muted)';

      var tdName = document.createElement('td');
      tdName.className = 'cat-name-cell';
      tdName.textContent = cat.name;

      var tdCount = document.createElement('td');
      var badge = document.createElement('span');
      badge.className = 'cat-count-badge';
      badge.textContent = count;
      tdCount.appendChild(badge);

      var tdActions = document.createElement('td');
      tdActions.className = 'cat-actions';
      tdActions.appendChild(makeEditBtn(cat));
      tdActions.appendChild(makeDeleteBtn(cat, count));

      tr.appendChild(tdNum);
      tr.appendChild(tdName);
      tr.appendChild(tdCount);
      tr.appendChild(tdActions);
      tbody.appendChild(tr);

      // Mobile card
      var card = document.createElement('div');
      card.className = 'cat-card';

      var info = document.createElement('div');
      info.className = 'cat-card-info';
      var nameEl = document.createElement('div');
      nameEl.className = 'cat-card-name';
      nameEl.textContent = cat.name;
      var countEl = document.createElement('div');
      countEl.className = 'cat-card-count';
      countEl.textContent = count + ' servicio' + (count !== 1 ? 's' : '');
      info.appendChild(nameEl);
      info.appendChild(countEl);

      var actions = document.createElement('div');
      actions.className = 'cat-actions';
      actions.appendChild(makeEditBtn(cat));
      actions.appendChild(makeDeleteBtn(cat, count));

      card.appendChild(info);
      card.appendChild(actions);
      cards.appendChild(card);
    });
  }

  function makeEditBtn(cat) {
    var btn = document.createElement('button');
    btn.className = 'cat-action-btn';
    btn.title = 'Editar';
    btn.appendChild(createSvg(['M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7', 'M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z']));
    btn.addEventListener('click', function() { editCategory(cat); });
    return btn;
  }

  function makeDeleteBtn(cat, count) {
    var btn = document.createElement('button');
    btn.className = 'cat-action-btn danger';
    btn.title = 'Eliminar';
    btn.appendChild(createSvg(['M3 6h18', 'M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2']));
    btn.addEventListener('click', function() { deleteCategory(cat.id, cat.name, count); });
    return btn;
  }

  function openNewCategory() {
    editingId = null;
    document.getElementById('cat-name').value = '';
    document.getElementById('cat-modal-title').textContent = 'Nueva categoria';
    openModal('modal-category');
    setTimeout(function() { document.getElementById('cat-name').focus(); }, 200);
  }

  function editCategory(cat) {
    editingId = cat.id;
    document.getElementById('cat-name').value = cat.name;
    document.getElementById('cat-modal-title').textContent = 'Editar categoria';
    openModal('modal-category');
    setTimeout(function() { document.getElementById('cat-name').focus(); }, 200);
  }

  async function deleteCategory(id, name, count) {
    var msg = 'Eliminar categoria "' + name + '"?';
    if (count > 0) {
      msg += '\n\n' + count + ' servicio' + (count !== 1 ? 's' : '') + ' quedara' + (count !== 1 ? 'n' : '') + ' sin categoria.';
    }
    if (!confirm(msg)) return;
    var res = await Api.delete('/service-categories/' + id);
    if (res.success) {
      showToast('Categoria eliminada', 'success');
      loadCategories();
    }
  }

  document.getElementById('btn-save-cat').addEventListener('click', async function() {
    var name = document.getElementById('cat-name').value.trim();
    if (!name) { showToast('El nombre es requerido', 'error'); document.getElementById('cat-name').focus(); return; }

    var btn = this;
    btn.disabled = true;

    var res;
    if (editingId) {
      res = await Api.put('/service-categories/' + editingId, { name: name });
    } else {
      res = await Api.post('/service-categories', { name: name });
    }

    if (res.success) {
      showToast(res.message || 'Guardado', 'success');
      closeModal('modal-category');
      editingId = null;
      loadCategories();
    } else {
      showToast(res.message || 'Error', 'error');
    }
    btn.disabled = false;
  });

  document.getElementById('cat-form').addEventListener('submit', function(e) { e.preventDefault(); document.getElementById('btn-save-cat').click(); });
  document.getElementById('btn-new-cat').addEventListener('click', openNewCategory);
  document.getElementById('btn-new-cat-empty').addEventListener('click', openNewCategory);

  loadCategories();
})();
</script>
