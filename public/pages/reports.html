<!-- Header -->
<div class="rp-header">
  <div class="rp-header-left">
    <a href="/dashboard" data-link class="cl-back" aria-label="Volver">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </a>
    <h2 class="rp-title" data-i18n="reports.title">Reportes</h2>
  </div>
  <div class="rp-export-btns">
    <button class="btn btn-secondary btn-sm" id="btn-export-excel" data-i18n="reports.export_excel">Exportar Excel</button>
    <button class="btn btn-secondary btn-sm" id="btn-export-pdf" data-i18n="reports.export_pdf">Exportar PDF</button>
  </div>
</div>

<!-- Filters -->
<div class="rp-filters">
  <div class="rp-filter-group">
    <label class="rp-filter-label">Desde</label>
    <input class="form-input" type="date" id="report-from">
  </div>
  <div class="rp-filter-group">
    <label class="rp-filter-label">Hasta</label>
    <input class="form-input" type="date" id="report-to">
  </div>
  <button class="btn btn-primary btn-sm rp-filter-btn" id="btn-load-report" data-i18n="common.search">Buscar</button>
</div>

<!-- Metrics -->
<div class="rp-metrics" id="report-metrics">
  <div class="rp-metric"><span class="rp-metric-value" id="rep-total">0</span><span class="rp-metric-label" data-i18n="reports.total_appointments">Total citas</span></div>
  <div class="rp-metric"><span class="rp-metric-value" id="rep-completed">0</span><span class="rp-metric-label" data-i18n="reports.completed">Completadas</span></div>
  <div class="rp-metric"><span class="rp-metric-value" id="rep-cancelled">0</span><span class="rp-metric-label" data-i18n="reports.cancelled">Canceladas</span></div>
  <div class="rp-metric"><span class="rp-metric-value rp-accent" id="rep-rate">0%</span><span class="rp-metric-label" data-i18n="reports.attendance_rate">Tasa asistencia</span></div>
  <div class="rp-metric"><span class="rp-metric-value rp-accent" id="rep-revenue">$0</span><span class="rp-metric-label" data-i18n="reports.total_revenue">Ingresos</span></div>
  <div class="rp-metric"><span class="rp-metric-value" id="rep-avg">$0</span><span class="rp-metric-label" data-i18n="reports.avg_ticket">Ticket promedio</span></div>
</div>

<!-- Charts -->
<div class="rp-charts">
  <div class="rp-chart-card">
    <h4 class="rp-chart-title" data-i18n="reports.by_day">Por dia</h4>
    <canvas id="chart-daily" height="250"></canvas>
  </div>
  <div class="rp-chart-card">
    <h4 class="rp-chart-title" data-i18n="reports.by_status">Por estado</h4>
    <canvas id="chart-status" height="250"></canvas>
  </div>
</div>

<style>
  .rp-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: var(--space-5); gap: var(--space-3); flex-wrap: wrap;
    animation: rpFade 0.4s ease;
  }
  .rp-header-left { display: flex; align-items: center; gap: var(--space-3); }
  .rp-title { font-family: var(--font-display); font-size: var(--text-2xl); font-weight: var(--weight-bold); letter-spacing: -0.03em; }
  .rp-export-btns { display: flex; gap: var(--space-2); }

  .cl-back {
    display: flex; align-items: center; justify-content: center;
    width: 36px; height: 36px; border-radius: var(--radius-md);
    color: var(--color-text-muted); transition: all var(--transition-fast);
  }
  .cl-back:hover { background: var(--color-surface-sunken); color: var(--color-text); transform: translateX(-2px); }

  .rp-filters {
    display: flex; gap: var(--space-3); flex-wrap: wrap; align-items: flex-end;
    padding: var(--space-4); margin-bottom: var(--space-5);
    background: var(--color-surface-raised); border: 1px solid var(--color-border-light);
    border-radius: var(--radius-xl); box-shadow: var(--shadow-xs);
    animation: rpFade 0.4s ease 0.05s both;
  }
  .rp-filter-group { display: flex; flex-direction: column; gap: var(--space-1); flex: 1; min-width: 140px; }
  .rp-filter-label { font-size: 0.6875rem; font-weight: var(--weight-bold); color: var(--color-text-muted); text-transform: uppercase; letter-spacing: 0.06em; }
  .rp-filter-btn { align-self: flex-end; }

  .rp-metrics {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--space-3);
    margin-bottom: var(--space-6); animation: rpSlide 0.5s ease 0.1s both;
  }
  .rp-metric {
    display: flex; flex-direction: column; align-items: center; text-align: center;
    padding: var(--space-4) var(--space-3);
    background: var(--color-surface-raised); border: 1px solid var(--color-border-light);
    border-radius: var(--radius-lg); box-shadow: var(--shadow-xs);
    transition: all var(--transition-fast);
  }
  .rp-metric:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
  .rp-metric-value {
    font-family: var(--font-display); font-size: var(--text-2xl); font-weight: var(--weight-bold);
    color: var(--color-text); line-height: 1; letter-spacing: -0.02em;
  }
  .rp-metric-value.rp-accent { color: var(--color-highlight); }
  .rp-metric-label { font-size: var(--text-xs); color: var(--color-text-muted); margin-top: var(--space-1); }

  .rp-charts {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: var(--space-4);
    margin-bottom: var(--space-6); animation: rpSlide 0.5s ease 0.15s both;
  }
  .rp-chart-card {
    background: var(--color-surface-raised); border: 1px solid var(--color-border-light);
    border-radius: var(--radius-xl); padding: var(--space-5); box-shadow: var(--shadow-sm);
  }
  .rp-chart-title {
    font-family: var(--font-display); font-size: var(--text-base); font-weight: var(--weight-semibold);
    color: var(--color-text); margin-bottom: var(--space-4); letter-spacing: -0.01em;
  }

  @media (max-width: 639px) {
    .rp-metrics { grid-template-columns: repeat(2, 1fr); }
    .rp-charts { grid-template-columns: 1fr; }
    .rp-export-btns { width: 100%; }
    .rp-export-btns .btn { flex: 1; }
  }
  @media (max-width: 375px) {
    .rp-title { font-size: var(--text-xl); }
    .rp-metric { padding: var(--space-3) var(--space-2); }
    .rp-metric-value { font-size: var(--text-lg); }
  }

  @keyframes rpFade { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes rpSlide { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
</style>

<script>
  (function () {
    const today = new Date();
    document.getElementById('report-from').value = today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0') + '-01';
    document.getElementById('report-to').value = today.toISOString().substring(0, 10);

    document.getElementById('btn-load-report').addEventListener('click', loadReport);

    async function loadReport() {
      const from = document.getElementById('report-from').value;
      const to = document.getElementById('report-to').value;
      const res = await Api.get('/reports?date_from=' + from + '&date_to=' + to);
      if (!res.success) return;

      const d = res.data;
      document.getElementById('rep-total').textContent = d.total_appointments;
      document.getElementById('rep-completed').textContent = d.completed;
      document.getElementById('rep-cancelled').textContent = d.cancelled;
      document.getElementById('rep-rate').textContent = d.attendance_rate + '%';
      document.getElementById('rep-revenue').textContent = formatCurrency(d.total_revenue);
      document.getElementById('rep-avg').textContent = formatCurrency(d.avg_ticket);

      drawBarChart('chart-daily', d.by_day || []);
      drawDonutChart('chart-status', d.by_status || []);
    }

    function drawBarChart(canvasId, data) {
      const canvas = document.getElementById(canvasId);
      const ctx = canvas.getContext('2d');
      const w = canvas.width = canvas.parentElement.clientWidth - 40;
      const h = canvas.height = 220;
      ctx.clearRect(0, 0, w, h);

      if (data.length === 0) { ctx.fillStyle = getCSS('--color-text-muted'); ctx.fillText('Sin datos', w/2-20, h/2); return; }

      const max = Math.max(...data.map(d => d.count), 1);
      const barW = Math.min(24, (w - 40) / data.length - 4);
      const startX = 40;
      const style = getComputedStyle(document.documentElement);
      const barColor = style.getPropertyValue('--color-highlight').trim();

      data.forEach((d, i) => {
        const barH = (d.count / max) * (h - 40);
        const x = startX + i * (barW + 4);
        const y = h - 20 - barH;
        ctx.fillStyle = barColor;
        ctx.beginPath();
        ctx.roundRect(x, y, barW, barH, 3);
        ctx.fill();
      });
    }

    function drawDonutChart(canvasId, data) {
      const canvas = document.getElementById(canvasId);
      const ctx = canvas.getContext('2d');
      const w = canvas.width = canvas.parentElement.clientWidth - 40;
      const h = canvas.height = 220;
      ctx.clearRect(0, 0, w, h);

      if (data.length === 0) { ctx.fillStyle = getCSS('--color-text-muted'); ctx.fillText('Sin datos', w/2-20, h/2); return; }

      const total = data.reduce((s, d) => s + d.count, 0);
      const cx = w / 2; const cy = h / 2; const r = 80; const inner = 45;
      const colors = { pending: '#F59E0B', confirmed: '#10B981', cancelled: '#EF4444', completed: '#3B82F6', no_show: '#8B5CF6' };
      let angle = -Math.PI / 2;

      data.forEach(d => {
        const slice = (d.count / total) * Math.PI * 2;
        ctx.beginPath();
        ctx.arc(cx, cy, r, angle, angle + slice);
        ctx.arc(cx, cy, inner, angle + slice, angle, true);
        ctx.closePath();
        ctx.fillStyle = colors[d.status] || '#888';
        ctx.fill();
        angle += slice;
      });
    }

    function getCSS(v) { return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); }

    loadReport();
  })();
</script>
