<div class="catalog-page" id="catalog-page">
  <div class="catalog-loading" id="catalog-loading">
    <div class="loader"><div class="loader-ring"></div></div>
  </div>
</div>

<style>
  .catalog-page{min-height:100dvh;background:var(--color-surface)}
  .catalog-loading{display:flex;align-items:center;justify-content:center;min-height:100dvh}
  .catalog-header-section{text-align:center;padding:clamp(3rem,8vw,5rem) clamp(1rem,4vw,3rem) var(--space-8)}
  .catalog-logo{width:72px;height:72px;border-radius:var(--radius-xl);margin:0 auto var(--space-4);object-fit:cover;border:2px solid var(--color-border-light)}
  .catalog-logo-placeholder{width:72px;height:72px;border-radius:var(--radius-xl);margin:0 auto var(--space-4);background:var(--color-surface-sunken);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:var(--text-2xl);font-weight:var(--weight-bold);color:var(--color-text-muted)}
  .catalog-biz-name{font-family:var(--font-display);font-size:var(--text-3xl);font-weight:var(--weight-bold);margin-bottom:var(--space-2);letter-spacing:-.02em}
  .catalog-biz-desc{font-size:var(--text-base);color:var(--color-text-secondary);max-width:480px;margin:0 auto var(--space-5);line-height:var(--leading-relaxed)}
  .catalog-social{display:flex;justify-content:center;gap:var(--space-4);margin-bottom:var(--space-4)}
  .catalog-social a{width:36px;height:36px;border-radius:var(--radius-full);background:var(--color-surface-sunken);display:flex;align-items:center;justify-content:center;color:var(--color-text-secondary);transition:all var(--transition-fast)}
  .catalog-social a:hover{background:var(--color-highlight);color:var(--color-text-inverse)}
  .catalog-social a svg{width:18px;height:18px}
  .catalog-address{font-size:var(--text-sm);color:var(--color-text-muted);margin-bottom:var(--space-2)}
  .catalog-address a{color:var(--color-highlight);text-decoration:underline}
  .catalog-body{max-width:960px;margin:0 auto;padding:0 clamp(1rem,4vw,3rem) var(--space-8)}
  .catalog-category{margin-bottom:var(--space-8)}
  .catalog-category-title{font-family:var(--font-display);font-size:var(--text-xl);font-weight:var(--weight-semibold);margin-bottom:var(--space-4);padding-bottom:var(--space-2);border-bottom:2px solid var(--color-highlight);display:inline-block}
  .catalog-services-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:var(--space-4)}
  .catalog-svc-card{background:var(--color-surface-raised);border:1px solid var(--color-border-light);border-radius:var(--radius-lg);overflow:hidden;transition:transform var(--transition-fast),box-shadow var(--transition-fast)}
  .catalog-svc-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}
  .catalog-svc-img{width:100%;height:140px;object-fit:cover;background:var(--color-surface-sunken)}
  .catalog-svc-body{padding:var(--space-4)}
  .catalog-svc-name{font-family:var(--font-display);font-size:var(--text-base);font-weight:var(--weight-semibold);margin-bottom:var(--space-1)}
  .catalog-svc-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--space-3)}
  .catalog-svc-duration{font-size:var(--text-sm);color:var(--color-text-muted)}
  .catalog-svc-price{font-family:var(--font-display);font-size:var(--text-lg);font-weight:var(--weight-bold);color:var(--color-highlight)}
  .catalog-svc-card .btn{width:100%;font-size:var(--text-sm);padding:var(--space-2) var(--space-4)}
  .catalog-qr{text-align:center;padding:var(--space-8) 0;border-top:1px solid var(--color-border-light);margin-top:var(--space-4)}
  .catalog-qr img{margin:0 auto var(--space-3)}
  .catalog-qr-label{font-size:var(--text-sm);color:var(--color-text-muted)}
  .booking-overlay{position:fixed;inset:0;z-index:200;background:var(--color-overlay);backdrop-filter:blur(6px);display:flex;align-items:flex-end;justify-content:center;padding:0;opacity:0;visibility:hidden;transition:all .3s}
  .booking-overlay.open{opacity:1;visibility:visible}
  .booking-panel{background:var(--color-surface-raised);border-radius:var(--radius-xl) var(--radius-xl) 0 0;width:100%;max-width:480px;max-height:90dvh;overflow-y:auto;padding:var(--space-6);transform:translateY(100%);transition:transform .35s cubic-bezier(.34,1.56,.64,1)}
  .booking-overlay.open .booking-panel{transform:translateY(0)}
  .booking-step{display:none}.booking-step.active{display:block}
  .booking-step-title{font-family:var(--font-display);font-size:var(--text-xl);font-weight:var(--weight-semibold);margin-bottom:var(--space-5)}
  .booking-progress{display:flex;gap:var(--space-2);margin-bottom:var(--space-5)}
  .booking-dot{width:100%;height:3px;border-radius:2px;background:var(--color-border-light)}.booking-dot.done{background:var(--color-highlight)}
  .booking-nav{display:flex;gap:var(--space-3);margin-top:var(--space-5)}.booking-nav .btn{flex:1}
  .booking-summary{display:flex;flex-direction:column;gap:var(--space-2);font-size:var(--text-sm)}
  .booking-summary-row{display:flex;justify-content:space-between}.booking-summary-label{color:var(--color-text-muted)}
  .booking-success{text-align:center;padding:var(--space-6) 0}
  .booking-success h3{font-family:var(--font-display);font-size:var(--text-xl);margin-bottom:var(--space-2)}
  .booking-success p{color:var(--color-text-muted);font-size:var(--text-sm);margin-bottom:var(--space-5)}
  @media(min-width:640px){.booking-overlay{align-items:center;padding:var(--space-4)}.booking-panel{border-radius:var(--radius-xl);transform:scale(.95) translateY(16px)}.booking-overlay.open .booking-panel{transform:scale(1) translateY(0)}}
</style>

<div class="booking-overlay" id="booking-overlay">
  <div class="booking-panel">
    <div class="booking-progress" id="booking-progress"><div class="booking-dot done"></div><div class="booking-dot"></div><div class="booking-dot"></div><div class="booking-dot"></div></div>
    <div class="booking-step active" data-bstep="1">
      <h3 class="booking-step-title" data-i18n="catalog.your_info">Tus datos</h3>
      <div class="form-group"><label class="form-label" data-i18n="clients.name">Nombre</label><input class="form-input" type="text" id="book-name" required></div>
      <div class="form-group"><label class="form-label" data-i18n="clients.phone">Telefono</label><input class="form-input" type="tel" id="book-phone" required></div>
      <div class="form-group"><label class="form-label" data-i18n="clients.email">Email (opcional)</label><input class="form-input" type="email" id="book-email"></div>
      <div class="booking-nav"><button class="btn btn-secondary" id="book-cancel" data-i18n="common.cancel">Cancelar</button><button class="btn btn-primary" id="book-next-1" data-i18n="auth.next">Siguiente</button></div>
    </div>
    <div class="booking-step" data-bstep="2" id="book-step-provider">
      <h3 class="booking-step-title" data-i18n="catalog.select_provider">Selecciona un prestador</h3>
      <div id="book-providers-list" class="flex flex-col gap-2"></div>
      <div class="booking-nav"><button class="btn btn-secondary book-prev" data-i18n="auth.previous">Anterior</button><button class="btn btn-primary" id="book-next-2" data-i18n="auth.next">Siguiente</button></div>
    </div>
    <div class="booking-step" data-bstep="3">
      <h3 class="booking-step-title" data-i18n="catalog.select_datetime">Fecha y hora</h3>
      <div class="form-group"><label class="form-label" data-i18n="appointments.date">Fecha</label><input class="form-input" type="date" id="book-date" required min=""></div>
      <div class="form-group"><label class="form-label" data-i18n="appointments.select_time">Hora</label><select class="form-input" id="book-time"><option value="">Cargando...</option></select></div>
      <div class="booking-nav"><button class="btn btn-secondary book-prev" data-i18n="auth.previous">Anterior</button><button class="btn btn-primary" id="book-next-3" data-i18n="auth.next">Siguiente</button></div>
    </div>
    <div class="booking-step" data-bstep="4">
      <h3 class="booking-step-title" data-i18n="catalog.confirm_booking">Confirmar cita</h3>
      <div class="booking-summary" id="book-summary"></div>
      <div class="booking-nav"><button class="btn btn-secondary book-prev" data-i18n="auth.previous">Anterior</button><button class="btn btn-primary" id="book-confirm" data-i18n="catalog.confirm_booking">Confirmar cita</button></div>
    </div>
    <div class="booking-step" data-bstep="5">
      <div class="booking-success">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--color-success)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin:0 auto var(--space-4);"><circle cx="12" cy="12" r="10"/><polyline points="9 12 11.5 14.5 16 9.5"/></svg>
        <h3 data-i18n="catalog.booking_success">Tu cita ha sido agendada</h3>
        <p data-i18n="catalog.booking_success_detail">Recibiras una confirmacion por WhatsApp y correo electronico</p>
        <button class="btn btn-primary" id="book-done" data-i18n="common.close">Cerrar</button>
      </div>
    </div>
  </div>
</div>

<script>
var CatalogPage=(function(){
  var slug='',businessData=null,selectedService=null,selectedProvider=null,bookingStep=1;

  function init(s){slug=s;loadCatalog();}

  async function loadCatalog(){
    var res=await Api.get('/catalog/'+encodeURIComponent(slug));
    document.getElementById('catalog-loading').style.display='none';
    if(!res.success){
      var page=document.getElementById('catalog-page');
      var msg=document.createElement('div');msg.className='empty-state';msg.style.minHeight='100dvh';
      var h=document.createElement('h3');h.className='empty-state-title';h.textContent='Negocio no encontrado';
      var p=document.createElement('p');p.className='empty-state-desc';p.textContent=res.message||'';
      msg.appendChild(h);msg.appendChild(p);page.appendChild(msg);return;
    }
    businessData=res.data;var biz=businessData.business;
    window._canBook=!!businessData.can_book;
    if(biz.theme)document.documentElement.setAttribute('data-theme',biz.theme);
    renderHeader(biz);renderServices(businessData.categories);renderQR(biz.slug);renderFooter();
    if(window._canBook)setupBooking(businessData.providers);
  }

  function renderHeader(biz){
    var page=document.getElementById('catalog-page');
    var section=document.createElement('div');section.className='catalog-header-section';
    if(biz.logo){var img=document.createElement('img');img.className='catalog-logo';img.src=biz.logo;img.alt=biz.name;section.appendChild(img);}
    else{var ph=document.createElement('div');ph.className='catalog-logo-placeholder';ph.textContent=biz.name?biz.name.charAt(0).toUpperCase():'C';section.appendChild(ph);}
    var name=document.createElement('h1');name.className='catalog-biz-name';name.textContent=biz.name;section.appendChild(name);
    if(biz.description){var desc=document.createElement('p');desc.className='catalog-biz-desc';desc.textContent=biz.description;section.appendChild(desc);}
    var social=document.createElement('div');social.className='catalog-social';
    if(biz.instagram)social.appendChild(makeSocialLink('https://instagram.com/'+biz.instagram.replace('@',''),'M2 2h20v20H2z M12 7v10 M7 12c0-2.8 2.2-5 5-5s5 2.2 5 5-2.2 5-5 5-5-2.2-5-5'));
    if(biz.whatsapp)social.appendChild(makeSocialLink('https://wa.me/'+biz.whatsapp.replace(/\D/g,''),'M12 2C6.5 2 2 6.5 2 12c0 1.8.5 3.5 1.3 5L2 22l5-1.3c1.5.8 3.2 1.3 5 1.3 5.5 0 10-4.5 10-10S17.5 2 12 2z'));
    if(biz.facebook)social.appendChild(makeSocialLink(biz.facebook,'M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z'));
    if(social.children.length)section.appendChild(social);
    if(biz.address){
      var addr=document.createElement('div');addr.className='catalog-address';
      if(biz.google_maps){var al=document.createElement('a');al.href=biz.google_maps;al.target='_blank';al.rel='noopener';al.textContent=biz.address;addr.appendChild(al);}
      else addr.textContent=biz.address;
      section.appendChild(addr);
    }
    page.appendChild(section);
  }

  function makeSocialLink(href,pathD){
    var a=document.createElement('a');a.href=href;a.target='_blank';a.rel='noopener';
    var ns='http://www.w3.org/2000/svg';
    var svg=document.createElementNS(ns,'svg');svg.setAttribute('viewBox','0 0 24 24');svg.setAttribute('fill','none');svg.setAttribute('stroke','currentColor');svg.setAttribute('stroke-width','1.8');svg.setAttribute('stroke-linecap','round');svg.setAttribute('stroke-linejoin','round');
    var path=document.createElementNS(ns,'path');path.setAttribute('d',pathD);svg.appendChild(path);a.appendChild(svg);return a;
  }

  function renderServices(categories){
    var page=document.getElementById('catalog-page');
    var body=document.createElement('div');body.className='catalog-body';
    var catNames=Object.keys(categories);
    catNames.forEach(function(catName){
      var catSection=document.createElement('div');catSection.className='catalog-category';
      var title=document.createElement('h2');title.className='catalog-category-title';title.textContent=catName;catSection.appendChild(title);
      var grid=document.createElement('div');grid.className='catalog-services-grid';
      categories[catName].forEach(function(svc){
        var card=document.createElement('div');card.className='catalog-svc-card';
        if(svc.image_url||svc.image){var img=document.createElement('img');img.className='catalog-svc-img';img.src=svc.image_url||svc.image;img.alt=svc.name;card.appendChild(img);}
        var cb=document.createElement('div');cb.className='catalog-svc-body';
        var sn=document.createElement('div');sn.className='catalog-svc-name';sn.textContent=svc.name;
        var meta=document.createElement('div');meta.className='catalog-svc-meta';
        var dur=document.createElement('span');dur.className='catalog-svc-duration';dur.textContent=(svc.duration_minutes||svc.duration||0)+' min';
        var price=document.createElement('span');price.className='catalog-svc-price';price.textContent=formatCurrency(svc.price_usd||svc.price||0);
        meta.appendChild(dur);meta.appendChild(price);
        if(window._canBook){
          var btn=document.createElement('button');btn.className='btn btn-primary';btn.textContent=i18n.t('catalog.book_now');
          btn.addEventListener('click',function(){startBooking(svc);});
          cb.appendChild(sn);cb.appendChild(meta);cb.appendChild(btn);
        }else{
          if(svc.description){var desc=document.createElement('p');desc.className='catalog-svc-desc';desc.textContent=svc.description;cb.appendChild(sn);cb.appendChild(desc);cb.appendChild(meta);}
          else{cb.appendChild(sn);cb.appendChild(meta);}
        }
        card.appendChild(cb);grid.appendChild(card);
      });
      catSection.appendChild(grid);body.appendChild(catSection);
    });
    page.appendChild(body);
  }

  function renderQR(s){
    var page=document.getElementById('catalog-page');
    var qr=document.createElement('div');qr.className='catalog-qr';
    var url='https://citaclick.net/negocio/'+s;
    qr.appendChild(generateQR(url,180));
    var lbl=document.createElement('div');lbl.className='catalog-qr-label';lbl.textContent=url;qr.appendChild(lbl);
    var dl=document.createElement('button');dl.className='btn btn-secondary btn-sm mt-4';dl.textContent=i18n.t('catalog.download_qr');
    dl.addEventListener('click',function(){var a=document.createElement('a');a.href=qr.querySelector('img').src;a.download='citaclick-qr-'+s+'.png';a.click();});
    qr.appendChild(dl);page.appendChild(qr);
  }

  function renderFooter(){
    var page=document.getElementById('catalog-page');
    var f=document.createElement('footer');f.className='site-footer';f.textContent='Desarrollado por ';
    var a=document.createElement('a');a.href='https://www.herasi.dev';a.target='_blank';a.rel='noopener noreferrer';a.textContent='@herasi.dev';f.appendChild(a);page.appendChild(f);
  }

  function setupBooking(providers){
    var multi=providers&&providers.length>1;
    document.getElementById('book-cancel').addEventListener('click',closeBooking);
    document.getElementById('book-done').addEventListener('click',closeBooking);
    document.getElementById('booking-overlay').addEventListener('click',function(e){if(e.target===this)closeBooking();});
    document.querySelectorAll('.book-prev').forEach(function(b){b.addEventListener('click',function(){goStep(bookingStep-1);});});
    document.getElementById('book-next-1').addEventListener('click',function(){if(!document.getElementById('book-name').value.trim()||!document.getElementById('book-phone').value.trim()){showToast(i18n.t('common.required_field'),'error');return;}goStep(multi?2:3);});
    document.getElementById('book-next-2').addEventListener('click',function(){if(!selectedProvider){showToast(i18n.t('common.required_field'),'error');return;}goStep(3);});
    document.getElementById('book-next-3').addEventListener('click',function(){if(!document.getElementById('book-date').value||!document.getElementById('book-time').value){showToast(i18n.t('common.required_field'),'error');return;}renderSummary();goStep(4);});
    document.getElementById('book-confirm').addEventListener('click',submitBooking);
    document.getElementById('book-date').addEventListener('change',loadBookingSlots);
    if(multi){var list=document.getElementById('book-providers-list');providers.forEach(function(p){
      var btn=document.createElement('button');btn.className='btn btn-secondary btn-full';btn.style.justifyContent='flex-start';btn.textContent=p.name;
      btn.addEventListener('click',function(){selectedProvider=p.id;list.querySelectorAll('.btn').forEach(function(b){b.classList.remove('btn-primary');b.classList.add('btn-secondary');});btn.classList.remove('btn-secondary');btn.classList.add('btn-primary');});
      list.appendChild(btn);
    });}
    var todayStr=new Date().toISOString().substring(0,10);document.getElementById('book-date').value=todayStr;document.getElementById('book-date').min=todayStr;
  }

  function startBooking(svc){selectedService=svc;bookingStep=1;selectedProvider=null;document.getElementById('book-name').value='';document.getElementById('book-phone').value='';document.getElementById('book-email').value='';goStep(1);document.getElementById('booking-overlay').classList.add('open');}
  function closeBooking(){document.getElementById('booking-overlay').classList.remove('open');bookingStep=1;}
  function goStep(n){bookingStep=n;document.querySelectorAll('.booking-step').forEach(function(s){s.classList.remove('active');});var t=document.querySelector('[data-bstep="'+n+'"]');if(t)t.classList.add('active');document.querySelectorAll('.booking-dot').forEach(function(d,i){d.classList.toggle('done',i<n);});if(n===3)loadBookingSlots();}

  async function loadBookingSlots(){
    var date=document.getElementById('book-date').value;if(!date)return;
    var q='?date='+date+'&duration='+(selectedService?(selectedService.duration_minutes||selectedService.duration||30):30);if(selectedProvider)q+='&provider_id='+selectedProvider;
    var res=await Api.get('/appointments/slots'+q);var sel=document.getElementById('book-time');sel.textContent='';
    var o0=document.createElement('option');o0.value='';o0.textContent=i18n.t('appointments.select_time');sel.appendChild(o0);
    if(res.success&&res.data)res.data.forEach(function(s){var o=document.createElement('option');o.value=s.start_time;o.textContent=s.start_time+' - '+s.end_time;sel.appendChild(o);});
  }

  function renderSummary(){
    var sum=document.getElementById('book-summary');sum.textContent='';
    [[i18n.t('clients.name'),document.getElementById('book-name').value],[i18n.t('clients.phone'),document.getElementById('book-phone').value],[i18n.t('nav.services'),selectedService?selectedService.name:''],[i18n.t('appointments.price'),selectedService?formatCurrency(selectedService.price_usd||selectedService.price||0):''],[i18n.t('common.date'),document.getElementById('book-date').value],[i18n.t('common.time'),document.getElementById('book-time').value]].forEach(function(r){
      var row=document.createElement('div');row.className='booking-summary-row';
      var lbl=document.createElement('span');lbl.className='booking-summary-label';lbl.textContent=r[0];
      var val=document.createElement('span');val.textContent=r[1];
      row.appendChild(lbl);row.appendChild(val);sum.appendChild(row);
    });
  }

  async function submitBooking(){
    var data={client_name:document.getElementById('book-name').value.trim(),client_phone:document.getElementById('book-phone').value.trim(),client_email:document.getElementById('book-email').value.trim(),service_id:selectedService.id,date:document.getElementById('book-date').value,start_time:document.getElementById('book-time').value};
    if(selectedProvider)data.provider_id=selectedProvider;
    var res=await Api.post('/catalog/'+encodeURIComponent(slug)+'/book',data);
    if(res.success)goStep(5);else showToast(res.message||i18n.t('errors.server'),'error');
  }

  return{init:init};
})();
</script>
