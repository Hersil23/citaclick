<!-- Page Header -->
<div class="cl-header">
  <div class="cl-header-left">
    <a href="/dashboard" data-link class="cl-back" aria-label="Volver">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </a>
    <div>
      <h2 class="cl-title" data-i18n="nav.clients">Clientes</h2>
      <p class="cl-subtitle" id="cl-count"></p>
    </div>
  </div>
  <button class="btn btn-primary" id="btn-new-client">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    <span data-i18n="clients.new">Nuevo cliente</span>
  </button>
</div>

<!-- Search -->
<div class="cl-search-wrap">
  <svg class="cl-search-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
  <input class="cl-search-input" type="search" id="client-search" data-i18n-placeholder="clients.search" placeholder="Buscar por nombre, cedula, telefono...">
</div>

<!-- Desktop Table -->
<div class="cl-table-card" id="clients-table-wrap">
  <table class="cl-table" id="clients-table">
    <thead>
      <tr>
        <th class="cl-th-num">#</th>
        <th>Nombre</th>
        <th>Cedula / ID</th>
        <th>Telefono</th>
        <th>Email</th>
        <th class="cl-th-center">Visitas</th>
        <th>Ultima visita</th>
        <th class="cl-th-center">Acciones</th>
      </tr>
    </thead>
    <tbody id="clients-tbody"></tbody>
  </table>
</div>

<!-- Mobile cards -->
<div id="clients-cards" class="mobile-only"></div>

<!-- Pagination -->
<div class="cl-pagination" id="clients-pagination"></div>

<!-- Empty State -->
<div class="cl-empty hidden" id="clients-empty">
  <div class="cl-empty-icon">
    <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
  </div>
  <h3 class="cl-empty-title" data-i18n="clients.no_clients">Aun no tienes clientes</h3>
  <p class="cl-empty-desc">Los clientes se agregan automaticamente al agendar citas, o puedes crearlos manualmente.</p>
  <button class="btn btn-primary" id="btn-new-client-empty" data-i18n="clients.new">Nuevo cliente</button>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-client">
  <div class="modal">
    <div class="modal-header">
      <h3 class="modal-title" data-i18n="clients.new">Nuevo cliente</h3>
      <button class="modal-close" onclick="closeModal('modal-client')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <form id="client-form" novalidate>
        <div class="form-group">
          <label class="form-label" data-i18n="clients.name">Nombre completo</label>
          <input class="form-input" type="text" id="client-name" required>
        </div>
        <div class="form-group">
          <label class="form-label">Cedula / Numero de identidad</label>
          <input class="form-input" type="text" id="client-id-number" placeholder="V-12345678, DNI, CC...">
        </div>
        <div class="form-group">
          <label class="form-label" data-i18n="clients.phone">Telefono</label>
          <div class="phone-input-group">
            <select class="form-input phone-code-select" id="client-pcode">
              <option value="+58">+58 VE</option>
              <option value="+57">+57 CO</option>
              <option value="+52">+52 MX</option>
              <option value="+1">+1 US/CA</option>
              <option value="+34">+34 ES</option>
              <option value="+44">+44 UK</option>
              <option value="+55">+55 BR</option>
              <option value="+56">+56 CL</option>
              <option value="+54">+54 AR</option>
              <option value="+51">+51 PE</option>
              <option value="+593">+593 EC</option>
              <option value="+507">+507 PA</option>
              <option value="+506">+506 CR</option>
              <option value="+503">+503 SV</option>
              <option value="+502">+502 GT</option>
              <option value="+505">+505 NI</option>
              <option value="+504">+504 HN</option>
              <option value="+591">+591 BO</option>
              <option value="+595">+595 PY</option>
              <option value="+598">+598 UY</option>
              <option value="+809">+809 DO</option>
              <option value="+53">+53 CU</option>
              <option value="+33">+33 FR</option>
              <option value="+49">+49 DE</option>
              <option value="+39">+39 IT</option>
              <option value="+351">+351 PT</option>
            </select>
            <input class="form-input phone-number-input" type="tel" id="client-phone" placeholder="4121234567">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" data-i18n="clients.email">Correo electronico</label>
          <input class="form-input" type="email" id="client-email">
        </div>
        <div class="form-group">
          <label class="form-label" data-i18n="clients.notes">Notas</label>
          <textarea class="form-input" id="client-notes" rows="2"></textarea>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('modal-client')" data-i18n="common.cancel">Cancelar</button>
      <button class="btn btn-primary" id="btn-save-client" data-i18n="common.save">Guardar</button>
    </div>
  </div>
</div>

<style>
  /* ========================================
     CLIENTS PAGE — Refined Editorial SaaS
     ======================================== */

  /* --- HEADER --- */
  .cl-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: var(--space-5);
    gap: var(--space-3);
    flex-wrap: wrap;
    animation: clFadeDown 0.4s ease;
  }

  .cl-header-left {
    display: flex;
    align-items: center;
    gap: var(--space-3);
  }

  .cl-back {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 36px;
    height: 36px;
    border-radius: var(--radius-md);
    color: var(--color-text-muted);
    transition: all var(--transition-fast);
  }

  .cl-back:hover {
    background: var(--color-surface-sunken);
    color: var(--color-text);
    transform: translateX(-2px);
  }

  .cl-title {
    font-family: var(--font-display);
    font-size: var(--text-2xl);
    font-weight: var(--weight-bold);
    color: var(--color-text);
    letter-spacing: -0.03em;
    line-height: 1.1;
  }

  .cl-subtitle {
    font-size: var(--text-xs);
    color: var(--color-text-muted);
    margin-top: 2px;
  }

  /* --- SEARCH --- */
  .cl-search-wrap {
    position: relative;
    max-width: 420px;
    margin-bottom: var(--space-5);
    animation: clFadeDown 0.4s ease 0.05s both;
  }

  .cl-search-icon {
    position: absolute;
    left: var(--space-3);
    top: 50%;
    transform: translateY(-50%);
    color: var(--color-text-muted);
    pointer-events: none;
    transition: color var(--transition-fast);
  }

  .cl-search-input {
    width: 100%;
    padding: var(--space-3) var(--space-4) var(--space-3) calc(var(--space-3) + 26px);
    font-size: var(--text-sm);
    color: var(--color-text);
    background: var(--color-surface-raised);
    border: 1px solid var(--color-border-light);
    border-radius: var(--radius-lg);
    transition: all var(--transition-fast);
    box-shadow: var(--shadow-xs);
  }

  .cl-search-input::placeholder { color: var(--color-text-muted); }

  .cl-search-input:focus {
    border-color: var(--color-input-focus);
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--color-highlight) 12%, transparent);
    outline: none;
  }

  .cl-search-input:focus ~ .cl-search-icon,
  .cl-search-wrap:focus-within .cl-search-icon {
    color: var(--color-highlight);
  }

  /* --- TABLE CARD --- */
  .cl-table-card {
    background: var(--color-surface-raised);
    border: 1px solid var(--color-border-light);
    border-radius: var(--radius-xl);
    overflow: hidden;
    box-shadow: var(--shadow-sm);
    animation: clFadeUp 0.5s ease 0.1s both;
  }

  .cl-table {
    width: 100%;
    border-collapse: collapse;
    font-size: var(--text-sm);
  }

  .cl-table thead {
    background: linear-gradient(180deg, var(--color-surface-sunken), var(--color-surface));
  }

  .cl-table th {
    text-align: left;
    padding: var(--space-3) var(--space-4);
    font-size: 0.6875rem;
    font-weight: var(--weight-bold);
    color: var(--color-text-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    border-bottom: 1px solid var(--color-border);
    white-space: nowrap;
    user-select: none;
  }

  .cl-th-num { width: 44px; text-align: center; }
  .cl-th-center { text-align: center; }

  .cl-table td {
    padding: var(--space-3) var(--space-4);
    border-bottom: 1px solid var(--color-border-light);
    vertical-align: middle;
    color: var(--color-text-secondary);
    transition: background-color var(--transition-fast);
  }

  .cl-table tbody tr {
    cursor: pointer;
    transition: background-color var(--transition-fast);
  }

  .cl-table tbody tr:hover td {
    background-color: color-mix(in srgb, var(--color-highlight) 4%, var(--color-surface-raised));
  }

  .cl-table tbody tr:last-child td {
    border-bottom: none;
  }

  /* --- ACTION BUTTONS --- */
  .action-btns {
    display: flex;
    gap: 4px;
    justify-content: center;
  }

  .action-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 30px;
    height: 30px;
    border-radius: var(--radius-md);
    color: var(--color-text-muted);
    font-size: var(--text-sm);
    cursor: pointer;
    transition: all var(--transition-fast);
    border: 1px solid transparent;
  }

  .action-btn:hover {
    background: var(--color-surface-sunken);
    color: var(--color-highlight);
    border-color: var(--color-border-light);
    transform: scale(1.1);
  }

  .action-btn.danger:hover {
    background: color-mix(in srgb, var(--color-error) 10%, transparent);
    color: var(--color-error);
    border-color: color-mix(in srgb, var(--color-error) 25%, transparent);
  }

  /* --- VISIT BADGE --- */
  .cl-visit-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 28px;
    height: 28px;
    padding: 0 var(--space-2);
    border-radius: var(--radius-full);
    font-family: var(--font-display);
    font-size: var(--text-sm);
    font-weight: var(--weight-bold);
    background: color-mix(in srgb, var(--color-highlight) 10%, transparent);
    color: var(--color-highlight);
  }

  .cl-visit-badge.zero {
    background: var(--color-surface-sunken);
    color: var(--color-text-muted);
    font-weight: var(--weight-regular);
  }

  /* --- MOBILE CARDS --- */
  .client-mobile-card {
    display: flex;
    align-items: center;
    gap: var(--space-3);
    padding: var(--space-3) var(--space-4);
    background: var(--color-surface-raised);
    border: 1px solid var(--color-border-light);
    border-left: 3px solid var(--color-highlight);
    border-radius: var(--radius-md);
    margin-bottom: var(--space-2);
    cursor: pointer;
    transition: all var(--transition-fast);
    animation: clFadeUp 0.3s ease both;
  }

  .client-mobile-card:hover {
    box-shadow: var(--shadow-md);
    transform: translateY(-1px);
  }

  .client-mobile-info {
    flex: 1;
    min-width: 0;
  }

  .client-mobile-info h4 {
    font-family: var(--font-display);
    font-size: var(--text-sm);
    font-weight: var(--weight-semibold);
    color: var(--color-text);
    margin-bottom: 2px;
  }

  .client-mobile-info p {
    font-size: var(--text-xs);
    color: var(--color-text-muted);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .client-mobile-actions {
    display: flex;
    gap: 2px;
    flex-shrink: 0;
  }

  /* --- PAGINATION --- */
  .cl-pagination {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: var(--space-2);
    margin-top: var(--space-5);
    flex-wrap: wrap;
    animation: clFadeUp 0.4s ease 0.15s both;
  }

  .cl-pagination button {
    display: inline-flex;
    align-items: center;
    gap: var(--space-1);
    padding: var(--space-2) var(--space-4);
    font-size: var(--text-sm);
    font-weight: var(--weight-medium);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-full);
    background: var(--color-surface-raised);
    color: var(--color-text-secondary);
    cursor: pointer;
    transition: all var(--transition-fast);
    box-shadow: var(--shadow-xs);
  }

  .cl-pagination button:hover:not(:disabled) {
    border-color: var(--color-highlight);
    color: var(--color-highlight);
    box-shadow: var(--shadow-sm);
    transform: translateY(-1px);
  }

  .cl-pagination button:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }

  .cl-pagination .page-info {
    font-size: var(--text-sm);
    color: var(--color-text-muted);
    padding: 0 var(--space-3);
    font-weight: var(--weight-medium);
  }

  /* --- EMPTY STATE --- */
  .cl-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: var(--space-16) var(--space-6);
    animation: clFadeUp 0.5s ease;
  }

  .cl-empty-icon {
    width: 80px;
    height: 80px;
    border-radius: var(--radius-full);
    background: linear-gradient(135deg, color-mix(in srgb, var(--color-highlight) 8%, transparent), color-mix(in srgb, var(--color-highlight) 16%, transparent));
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: var(--space-5);
    color: var(--color-highlight);
  }

  .cl-empty-title {
    font-family: var(--font-display);
    font-size: var(--text-xl);
    font-weight: var(--weight-semibold);
    color: var(--color-text);
    margin-bottom: var(--space-2);
  }

  .cl-empty-desc {
    font-size: var(--text-sm);
    color: var(--color-text-muted);
    max-width: 360px;
    margin-bottom: var(--space-6);
    line-height: var(--leading-relaxed);
  }

  /* --- PHONE INPUT --- */
  .phone-input-group { display: flex; gap: var(--space-2); }
  .phone-code-select { width: 110px; flex-shrink: 0; }
  .phone-number-input { flex: 1; min-width: 0; }

  /* --- RESPONSIVE --- */
  .cl-table-card { display: block; }

  @media (max-width: 768px) {
    .cl-table-card { display: none; }
  }

  @media (min-width: 769px) {
    .mobile-only { display: none !important; }
  }

  @media (max-width: 375px) {
    .cl-title { font-size: var(--text-xl); }
    .cl-search-input { font-size: var(--text-xs); }
    .phone-code-select { width: 90px; }
    .client-mobile-card { padding: var(--space-2) var(--space-3); gap: var(--space-2); }
  }

  /* --- ANIMATIONS --- */
  @keyframes clFadeDown {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes clFadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>

<script>
  (function () {
    var tbody = document.getElementById('clients-tbody');
    var cardsEl = document.getElementById('clients-cards');
    var emptyEl = document.getElementById('clients-empty');
    var tableWrap = document.getElementById('clients-table-wrap');
    var paginationEl = document.getElementById('clients-pagination');
    var searchInput = document.getElementById('client-search');
    var editingId = null;
    var currentPage = 1;
    var pageSize = 20;

    async function loadClients(search, page) {
      page = page || 1;
      currentPage = page;
      var url = '/clients?limit=' + pageSize + '&page=' + page;
      if (search) url += '&search=' + encodeURIComponent(search);
      var res = await Api.get(url);
      if (!res.success) return;

      var clients = res.data || [];
      tbody.textContent = '';
      cardsEl.textContent = '';

      if (clients.length === 0 && page === 1) {
        emptyEl.classList.remove('hidden');
        tableWrap.classList.add('hidden');
        cardsEl.classList.add('hidden');
        paginationEl.textContent = '';
        return;
      }

      emptyEl.classList.add('hidden');
      tableWrap.classList.remove('hidden');
      cardsEl.classList.remove('hidden');
      var countEl = document.getElementById('cl-count');
      if (countEl) countEl.textContent = clients.length + (clients.length >= pageSize ? '+' : '') + ' clientes';

      clients.forEach(function(c, idx) {
        // Table row (desktop)
        var tr = document.createElement('tr');
        tr.style.cursor = 'pointer';
        tr.addEventListener('click', function() { editClient(c); });

        var tdNum = document.createElement('td');
        tdNum.className = 'text-muted';
        tdNum.textContent = ((currentPage - 1) * pageSize) + idx + 1;

        var tdName = document.createElement('td');
        var nameStrong = document.createElement('strong');
        nameStrong.textContent = c.name;
        tdName.appendChild(nameStrong);

        var tdId = document.createElement('td');
        tdId.textContent = c.id_number || '-';

        var tdPhone = document.createElement('td');
        tdPhone.textContent = c.phone || '-';

        var tdEmail = document.createElement('td');
        tdEmail.textContent = c.email || '-';

        var tdVisits = document.createElement('td');
        tdVisits.className = 'cl-th-center';
        var badge = document.createElement('span');
        var visits = c.total_visits || 0;
        badge.className = 'cl-visit-badge' + (visits === 0 ? ' zero' : '');
        badge.textContent = visits;
        tdVisits.appendChild(badge);

        var tdLast = document.createElement('td');
        tdLast.textContent = c.last_visit ? new Date(c.last_visit).toLocaleDateString() : '-';

        var tdActions = document.createElement('td');
        var actionsDiv = document.createElement('div');
        actionsDiv.className = 'action-btns';
        var btnEdit = document.createElement('button');
        btnEdit.className = 'action-btn';
        btnEdit.title = 'Editar';
        btnEdit.textContent = '\u270E';
        btnEdit.addEventListener('click', function(e) { e.stopPropagation(); editClient(c); });
        var btnDel = document.createElement('button');
        btnDel.className = 'action-btn danger';
        btnDel.title = 'Eliminar';
        btnDel.textContent = '\u2716';
        btnDel.addEventListener('click', function(e) { e.stopPropagation(); deleteClient(c.id, c.name); });
        actionsDiv.appendChild(btnEdit);
        actionsDiv.appendChild(btnDel);
        tdActions.appendChild(actionsDiv);

        tr.appendChild(tdNum);
        tr.appendChild(tdName);
        tr.appendChild(tdId);
        tr.appendChild(tdPhone);
        tr.appendChild(tdEmail);
        tr.appendChild(tdVisits);
        tr.appendChild(tdLast);
        tr.appendChild(tdActions);
        tbody.appendChild(tr);

        // Mobile card
        var card = document.createElement('div');
        card.className = 'client-mobile-card';
        card.addEventListener('click', function() { editClient(c); });

        var avatar = document.createElement('div');
        avatar.className = 'avatar avatar-md';
        avatar.textContent = getInitials(c.name);

        var info = document.createElement('div');
        info.className = 'client-mobile-info';
        var h4 = document.createElement('h4');
        h4.textContent = c.name;
        var p = document.createElement('p');
        p.textContent = c.phone || c.email || (c.id_number || '');
        info.appendChild(h4);
        info.appendChild(p);

        var mActions = document.createElement('div');
        mActions.className = 'client-mobile-actions';
        var mEdit = document.createElement('button');
        mEdit.className = 'action-btn';
        mEdit.textContent = '\u270E';
        mEdit.addEventListener('click', function(e) { e.stopPropagation(); editClient(c); });
        var mDel = document.createElement('button');
        mDel.className = 'action-btn danger';
        mDel.textContent = '\u2716';
        mDel.addEventListener('click', function(e) { e.stopPropagation(); deleteClient(c.id, c.name); });
        mActions.appendChild(mEdit);
        mActions.appendChild(mDel);

        card.appendChild(avatar);
        card.appendChild(info);
        card.appendChild(mActions);
        cardsEl.appendChild(card);
      });

      // Pagination
      renderPagination(clients.length);
    }

    function renderPagination(count) {
      paginationEl.textContent = '';

      var prev = document.createElement('button');
      prev.textContent = '\u2190 Anterior';
      prev.disabled = currentPage <= 1;
      prev.addEventListener('click', function() { loadClients(searchInput.value.trim(), currentPage - 1); });

      var info = document.createElement('span');
      info.className = 'page-info';
      info.textContent = 'Pagina ' + currentPage;

      var next = document.createElement('button');
      next.textContent = 'Siguiente \u2192';
      next.disabled = count < pageSize;
      next.addEventListener('click', function() { loadClients(searchInput.value.trim(), currentPage + 1); });

      paginationEl.appendChild(prev);
      paginationEl.appendChild(info);
      paginationEl.appendChild(next);
    }

    function editClient(c) {
      editingId = c.id;
      document.getElementById('client-name').value = c.name || '';
      document.getElementById('client-id-number').value = c.id_number || '';
      var phone = c.phone || '';
      var pcodeEl = document.getElementById('client-pcode');
      var phoneEl = document.getElementById('client-phone');
      var matched = false;
      if (phone) {
        for (var i = 0; i < pcodeEl.options.length; i++) {
          if (phone.startsWith(pcodeEl.options[i].value)) {
            pcodeEl.value = pcodeEl.options[i].value;
            phoneEl.value = phone.slice(pcodeEl.options[i].value.length);
            matched = true;
            break;
          }
        }
        if (!matched) phoneEl.value = phone;
      } else {
        phoneEl.value = '';
      }
      document.getElementById('client-email').value = c.email || '';
      document.getElementById('client-notes').value = c.notes || '';
      document.querySelector('#modal-client .modal-title').textContent = 'Editar cliente';
      openModal('modal-client');
    }

    document.getElementById('btn-save-client').addEventListener('click', async function() {
      var pcode = document.getElementById('client-pcode').value;
      var pnum = document.getElementById('client-phone').value.trim();
      var fullPhone = pnum ? pcode + pnum : '';
      var data = {
        name: document.getElementById('client-name').value.trim(),
        id_number: document.getElementById('client-id-number').value.trim(),
        phone: fullPhone,
        email: document.getElementById('client-email').value.trim(),
        notes: document.getElementById('client-notes').value.trim(),
      };

      if (!data.name) { showToast('El nombre es requerido', 'error'); return; }

      var res;
      if (editingId) {
        res = await Api.put('/clients/' + editingId, data);
      } else {
        res = await Api.post('/clients', data);
      }

      if (res.success) {
        showToast(res.message, 'success');
        closeModal('modal-client');
        editingId = null;
        document.getElementById('client-form').reset();
        loadClients(searchInput.value.trim(), currentPage);
      }
    });

    function openNewClient() {
      editingId = null;
      document.getElementById('client-form').reset();
      document.querySelector('#modal-client .modal-title').textContent = 'Nuevo cliente';
      openModal('modal-client');
    }

    document.getElementById('btn-new-client').addEventListener('click', openNewClient);
    var btnEmpty = document.getElementById('btn-new-client-empty');
    if (btnEmpty) btnEmpty.addEventListener('click', openNewClient);

    async function deleteClient(id, name) {
      if (!confirm('Eliminar a "' + name + '"? Esta accion no se puede deshacer.')) return;
      var res = await Api.delete('/clients/' + id);
      if (res.success) {
        showToast('Cliente eliminado', 'success');
        loadClients(searchInput.value.trim(), currentPage);
      }
    }

    searchInput.addEventListener('input', debounce(function() {
      loadClients(searchInput.value.trim(), 1);
    }, 300));

    loadClients();
  })();
</script>
