<style>
  .dashboard-metrics {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: var(--space-3);
    margin-bottom: var(--space-6);
  }

  .metric-card {
    display: flex;
    align-items: center;
    gap: var(--space-4);
    padding: var(--space-4) var(--space-5);
    background-color: var(--color-surface-raised);
    border-radius: var(--radius-lg);
    border: 1px solid var(--color-border-light);
    transition: box-shadow var(--transition-fast), transform var(--transition-fast);
    box-shadow: var(--shadow-xs);
  }

  .metric-card:hover {
    box-shadow: var(--shadow-md);
    transform: translateY(-1px);
  }

  .metric-icon {
    width: 44px;
    height: 44px;
    border-radius: var(--radius-lg);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .metric-icon svg {
    width: 22px;
    height: 22px;
  }

  .metric-icon-today {
    background-color: var(--status-completed-bg);
    color: var(--color-info);
  }

  .metric-icon-pending {
    background-color: var(--status-pending-bg);
    color: var(--status-pending);
  }

  .metric-icon-clients {
    background-color: var(--status-confirmed-bg);
    color: var(--color-success);
  }

  .metric-icon-revenue {
    background-color: var(--status-no-show-bg);
    color: var(--status-no-show);
  }

  .metric-data {
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  .metric-value {
    font-family: var(--font-display);
    font-size: var(--text-2xl);
    font-weight: var(--weight-bold);
    color: var(--color-text);
    line-height: 1;
    letter-spacing: -0.02em;
  }

  .metric-label {
    font-size: var(--text-xs);
    color: var(--color-text-muted);
    margin-top: var(--space-1);
  }

  .calendar-container {
    background-color: var(--color-surface-raised);
    border: 1px solid var(--color-border-light);
    border-radius: var(--radius-xl);
    overflow: hidden;
    box-shadow: var(--shadow-sm);
  }

  .calendar-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: var(--space-4) var(--space-5);
    gap: var(--space-3);
    flex-wrap: wrap;
    border-bottom: 1px solid var(--color-border-light);
  }

  .calendar-nav-group {
    display: flex;
    align-items: center;
    gap: var(--space-1);
  }

  .calendar-current-label {
    font-family: var(--font-display);
    font-size: var(--text-lg);
    font-weight: var(--weight-semibold);
    color: var(--color-text);
    text-align: center;
    flex: 1;
    min-width: 140px;
    letter-spacing: -0.01em;
  }

  .calendar-view-switcher {
    display: flex;
    background-color: var(--color-surface-sunken);
    border-radius: var(--radius-md);
    padding: 2px;
    gap: 2px;
  }

  .cal-view-btn {
    padding: var(--space-1) var(--space-3);
    font-size: var(--text-sm);
    font-weight: var(--weight-medium);
    color: var(--color-text-muted);
    border-radius: calc(var(--radius-md) - 2px);
    cursor: pointer;
    transition: all var(--transition-fast);
    border: none;
    background: transparent;
    white-space: nowrap;
  }

  .cal-view-btn:hover {
    color: var(--color-text);
  }

  .cal-view-btn.active {
    background-color: var(--color-surface-raised);
    color: var(--color-text);
    box-shadow: var(--shadow-xs);
    font-weight: var(--weight-semibold);
  }

  .calendar-body {
    min-height: 480px;
    padding: var(--space-2);
  }

  .cal-month-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 1px;
    background-color: var(--color-border-light);
    border-radius: var(--radius-md);
    overflow: hidden;
  }

  .cal-day-header {
    padding: var(--space-2);
    text-align: center;
    font-size: var(--text-xs);
    font-weight: var(--weight-bold);
    color: var(--color-text-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    background-color: var(--color-surface);
  }

  .cal-day {
    min-height: 80px;
    padding: var(--space-1) var(--space-2);
    background-color: var(--color-surface-raised);
    cursor: pointer;
    transition: background-color var(--transition-fast);
    position: relative;
  }

  .cal-day:hover {
    background-color: var(--color-surface-sunken);
  }

  .cal-day-number {
    font-size: var(--text-sm);
    font-weight: var(--weight-medium);
    color: var(--color-text-secondary);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 26px;
    height: 26px;
    border-radius: var(--radius-full);
    transition: all var(--transition-fast);
  }

  .cal-day.today .cal-day-number {
    background-color: var(--color-highlight);
    color: var(--color-text-inverse);
    font-weight: var(--weight-bold);
  }

  .cal-day.other-month {
    opacity: 0.35;
  }

  .cal-event {
    display: block;
    font-size: 0.6875rem;
    padding: 1px var(--space-1);
    margin-top: 2px;
    border-radius: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.4;
    font-weight: var(--weight-medium);
    cursor: pointer;
    transition: filter var(--transition-fast);
  }

  .cal-event:hover {
    filter: brightness(1.1);
  }

  .cal-event-pending    { background: var(--status-pending-bg); color: var(--status-pending); }
  .cal-event-confirmed  { background: var(--status-confirmed-bg); color: var(--status-confirmed); }
  .cal-event-cancelled  { background: var(--status-cancelled-bg); color: var(--status-cancelled); }
  .cal-event-completed  { background: var(--status-completed-bg); color: var(--status-completed); }
  .cal-event-no_show    { background: var(--status-no-show-bg); color: var(--status-no-show); }

  .cal-week-grid {
    display: grid;
    grid-template-columns: 60px repeat(7, 1fr);
    min-height: 600px;
  }

  .cal-week-time {
    font-size: var(--text-xs);
    color: var(--color-text-muted);
    padding: var(--space-1) var(--space-2);
    text-align: right;
    border-right: 1px solid var(--color-border-light);
    height: 48px;
  }

  .cal-week-cell {
    border-right: 1px solid var(--color-border-light);
    border-bottom: 1px solid var(--color-border-light);
    min-height: 48px;
    padding: 1px;
    position: relative;
    cursor: pointer;
    transition: background-color var(--transition-fast);
  }

  .cal-week-cell:hover {
    background-color: var(--color-surface-sunken);
  }

  .cal-day-timeline {
    position: relative;
    min-height: 600px;
  }

  .cal-timeline-hour {
    display: flex;
    min-height: 60px;
    border-bottom: 1px solid var(--color-border-light);
  }

  .cal-timeline-label {
    width: 60px;
    font-size: var(--text-xs);
    color: var(--color-text-muted);
    padding: var(--space-1) var(--space-2);
    text-align: right;
    flex-shrink: 0;
  }

  .cal-timeline-slot {
    flex: 1;
    position: relative;
    cursor: pointer;
    transition: background-color var(--transition-fast);
  }

  .cal-timeline-slot:hover {
    background-color: var(--color-surface-sunken);
  }

  .cal-timeline-event {
    position: absolute;
    left: 4px;
    right: 4px;
    padding: var(--space-1) var(--space-2);
    border-radius: var(--radius-sm);
    font-size: var(--text-xs);
    font-weight: var(--weight-medium);
    overflow: hidden;
    cursor: pointer;
    z-index: 1;
    transition: box-shadow var(--transition-fast);
  }

  .cal-timeline-event:hover {
    box-shadow: var(--shadow-md);
  }

  @media (min-width: 640px) {
    .dashboard-metrics {
      grid-template-columns: repeat(4, 1fr);
    }
  }

  @media (max-width: 639px) {
    .calendar-toolbar {
      padding: var(--space-3);
    }

    .calendar-current-label {
      font-size: var(--text-base);
      order: -1;
      flex-basis: 100%;
      text-align: left;
    }

    .cal-day {
      min-height: 48px;
    }

    .cal-event {
      font-size: 0.625rem;
    }
  }

  @media (max-width: 375px) {
    .dashboard-metrics {
      gap: var(--space-2);
    }

    .metric-card {
      padding: var(--space-3);
      gap: var(--space-2);
    }

    .metric-icon {
      width: 36px;
      height: 36px;
    }

    .metric-icon svg {
      width: 18px;
      height: 18px;
    }

    .metric-value {
      font-size: var(--text-lg);
    }

    .metric-label {
      font-size: 0.6875rem;
    }

    .calendar-toolbar {
      padding: var(--space-2);
      gap: var(--space-2);
    }

    .calendar-current-label {
      font-size: var(--text-sm);
      min-width: 0;
    }

    .cal-view-btn {
      padding: var(--space-1) var(--space-2);
      font-size: var(--text-xs);
    }

    .calendar-body {
      padding: var(--space-1);
    }

    .cal-day {
      min-height: 40px;
      padding: 2px;
    }

    .cal-day-number {
      font-size: var(--text-xs);
      width: 22px;
      height: 22px;
    }

    .cal-day-header {
      padding: var(--space-1);
      font-size: 0.625rem;
    }

    .cal-timeline-label {
      width: 40px;
      font-size: 0.625rem;
    }

    .cal-week-grid {
      grid-template-columns: 40px repeat(7, 1fr);
    }
  }
</style>

<script>
  (function () {
    const user = Auth.getUser();
    if (user) {
      const avatarHtml = getInitials(user.name);
      document.getElementById('sidebar-avatar').textContent = avatarHtml;
      document.getElementById('header-avatar').textContent = avatarHtml;
      document.getElementById('sidebar-username').textContent = user.name || '';
      document.getElementById('sidebar-role').textContent = user.role || '';
      document.getElementById('lang-btn').textContent = i18n.getLocale().toUpperCase();

      if (user.role === 'owner' || user.role === 'admin') {
        const provLink = document.querySelector('.sidebar-link-providers');
        if (provLink) provLink.style.display = '';
      }
    }

    loadDashboardMetrics();

    if (typeof Calendar !== 'undefined') {
      Calendar.init('calendar-body', {
        onEventClick: (id) => Router.navigate('/appointments?id=' + id),
        onSlotClick: (date, time) => openModal('modal-new-appointment'),
      });
    }

    const fabBtn = document.getElementById('fab-new-appointment');
    if (fabBtn) {
      fabBtn.addEventListener('click', () => {
        Router.navigate('/appointments?action=new');
      });
    }

    async function loadDashboardMetrics() {
      const res = await Api.get('/appointments?metrics=true');
      if (res.success && res.data) {
        const d = res.data;
        document.getElementById('metric-today').textContent = d.today || 0;
        document.getElementById('metric-pending').textContent = d.pending || 0;
        document.getElementById('metric-clients').textContent = d.total_clients || 0;
        document.getElementById('metric-revenue').textContent = formatCurrency(d.revenue || 0);
      }
    }
  })();
</script>
