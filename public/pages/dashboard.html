          </div>

        <div class="calendar-body" id="calendar-body"></div>

      <button class="fab mobile-only" id="fab-new-appointment" aria-label="Nueva cita">

<style>
  /* ============================================
     DASHBOARD — MOBILE FIRST
     ============================================ */

  .app-main {
    min-width: 0;
    overflow-x: hidden;
  }

  .dash-content {
    min-width: 0;
    overflow-x: hidden;
  }

  .site-footer {
    text-align: center;
    justify-content: center;
    width: 100%;
  }

  /* --- GREETING (compact by default) --- */

  .dash-greeting {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--space-2);
    margin-bottom: var(--space-3);
  }

  .dash-greeting-msg {
    font-family: var(--font-display);
    font-size: var(--text-lg);
    font-weight: var(--weight-bold);
    color: var(--color-text);
    letter-spacing: -0.02em;
    line-height: 1.2;
    margin: 0;
  }

  .dash-greeting-sub {
    font-size: var(--text-xs);
    color: var(--color-text-muted);
    margin-top: 2px;
  }

  .dash-greeting-time {
    font-family: var(--font-display);
    font-size: var(--text-xl);
    font-weight: var(--weight-bold);
    color: var(--color-highlight);
    letter-spacing: -0.02em;
    flex-shrink: 0;
    line-height: 1;
  }

  /* --- METRICS (2x2 grid on mobile) --- */

  .dash-metrics-track {
    margin-bottom: var(--space-3);
  }

  .dashboard-metrics {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: var(--space-2);
  }

  .metric-card {
    display: flex;
    align-items: center;
    gap: var(--space-2);
    padding: var(--space-2) var(--space-3);
    background-color: var(--color-surface-raised);
    border-radius: var(--radius-lg);
    border: 1px solid var(--color-border-light);
    box-shadow: var(--shadow-xs);
    min-width: 0;
  }

  .metric-icon {
    width: 30px;
    height: 30px;
    border-radius: var(--radius-md);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .metric-icon svg {
    width: 16px;
    height: 16px;
  }

  .metric-icon-today  { background-color: var(--status-completed-bg); color: var(--color-info); }
  .metric-icon-pending { background-color: var(--status-pending-bg); color: var(--status-pending); }
  .metric-icon-clients { background-color: var(--status-confirmed-bg); color: var(--color-success); }
  .metric-icon-revenue { background-color: var(--status-no-show-bg); color: var(--status-no-show); }

  .metric-data {
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  .metric-value {
    font-family: var(--font-display);
    font-size: var(--text-lg);
    font-weight: var(--weight-bold);
    color: var(--color-text);
    line-height: 1;
    letter-spacing: -0.02em;
  }

  .metric-label {
    font-size: 0.6875rem;
    color: var(--color-text-muted);
    margin-top: 1px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* --- SHARE BAR (compact on mobile) --- */

  .dash-share-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--space-2);
    padding: var(--space-2) var(--space-3);
    margin-bottom: var(--space-3);
    background: color-mix(in srgb, var(--color-highlight) 6%, var(--color-surface-raised));
    border: 1px solid color-mix(in srgb, var(--color-highlight) 20%, transparent);
    border-radius: var(--radius-lg);
  }

  .dash-share-info {
    display: flex;
    align-items: center;
    gap: var(--space-2);
    font-size: var(--text-xs);
    color: var(--color-text-secondary);
    min-width: 0;
  }

  .dash-share-info svg { color: var(--color-highlight); flex-shrink: 0; }

  .dash-share-text {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .dash-share-actions {
    display: flex;
    align-items: center;
    gap: var(--space-1);
    flex-shrink: 0;
  }

  /* --- EXCHANGE RATE WIDGET --- */

  .dash-rate-bar {
    display: flex;
    flex-direction: column;
    gap: var(--space-2);
    padding: var(--space-3);
    margin-bottom: var(--space-3);
    background: var(--color-surface-raised);
    border: 1px solid var(--color-border-light);
    border-radius: var(--radius-lg);
  }

  .dash-rate-row1 {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--space-2);
  }

  .dash-rate-source {
    padding: 4px 8px;
    font-size: var(--text-xs);
    font-weight: var(--weight-bold);
    background: var(--color-surface-sunken);
    border: 1px solid var(--color-border-light);
    border-radius: var(--radius-sm);
    color: var(--color-text);
  }

  .dash-rate-result {
    font-size: var(--text-sm);
    font-weight: var(--weight-bold);
    color: var(--color-highlight);
  }

  .dash-rate-row2 {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--space-2);
  }

  .dash-rate-converter {
    display: flex;
    align-items: center;
    gap: var(--space-1);
    flex: 1;
  }

  .dash-rate-input {
    width: 60px;
    padding: 4px 6px;
    font-size: var(--text-sm);
    font-weight: var(--weight-bold);
    color: var(--color-text);
    background: var(--color-surface-sunken);
    border: 1px solid var(--color-border-light);
    border-radius: var(--radius-sm);
    text-align: right;
    -moz-appearance: textfield;
  }

  .dash-rate-input::-webkit-inner-spin-button,
  .dash-rate-input::-webkit-outer-spin-button { -webkit-appearance: none; }

  .dash-rate-arrow {
    font-size: var(--text-xs);
    color: var(--color-text-muted);
  }

  .dash-rate-local {
    font-size: var(--text-sm);
    font-weight: var(--weight-bold);
    color: var(--color-text);
  }

  .dash-rate-currency {
    font-size: var(--text-xs);
    font-weight: var(--weight-semibold);
    color: var(--color-text-muted);
  }

  /* --- CALENDAR (compact on mobile) --- */

  .calendar-container {
    background-color: var(--color-surface-raised);
    border: 1px solid var(--color-border-light);
    border-radius: var(--radius-xl);
    overflow: hidden;
    box-shadow: var(--shadow-sm);
    min-width: 0;
    width: 100%;
  }

  .calendar-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: var(--space-2) var(--space-3);
    gap: var(--space-2);
    flex-wrap: wrap;
    border-bottom: 1px solid var(--color-border-light);
  }

  .calendar-nav-group {
    display: flex;
    align-items: center;
    gap: var(--space-1);
  }

  .calendar-current-label {
    font-family: var(--font-display);
    font-size: var(--text-sm);
    font-weight: var(--weight-semibold);
    color: var(--color-text);
    text-align: center;
    flex: 1;
    min-width: 0;
    letter-spacing: -0.01em;
    order: -1;
    flex-basis: 100%;
    text-align: left;
  }

  .calendar-view-switcher {
    display: flex;
    background-color: var(--color-surface-sunken);
    border-radius: var(--radius-md);
    padding: 2px;
    gap: 2px;
  }

  .cal-view-btn {
    padding: var(--space-1) var(--space-2);
    font-size: var(--text-xs);

  .cal-view-btn:hover { color: var(--color-text); }

  .cal-view-btn.active {
    background-color: var(--color-surface-raised);

  .calendar-body {
    min-height: 280px;
    padding: var(--space-1);

  }

  /* --- CALENDAR CELLS (mobile) --- */

  .cal-month-grid {
    display: grid;

  .cal-day {

  .cal-day.today .cal-day-number {

  .cal-event {
    display: block;
    font-size: 0;
    padding: 0;
    margin-top: 2px;
    border-radius: 1px;
    height: 3px;
    cursor: pointer;
    transition: filter var(--transition-fast);
    max-width: 100%;
  }

  .cal-event:hover { filter: brightness(1.1); }

  .cal-event-pending    { background: var(--status-pending); }
  .cal-event-confirmed  { background: var(--status-confirmed); }
  .cal-event-cancelled  { background: var(--status-cancelled); }
  .cal-event-completed  { background: var(--status-completed); }
  .cal-event-no_show    { background: var(--status-no-show); }

  /* --- WEEK/DAY VIEWS --- */

  .cal-week-grid {
    display: grid;
    grid-template-columns: 36px repeat(7, minmax(0, 1fr));
    min-height: 400px;
  }

  .cal-week-time {
    font-size: 0.625rem;
    color: var(--color-text-muted);
    padding: var(--space-1) 2px;
    text-align: right;
    border-right: 1px solid var(--color-border-light);
    height: 40px;
  }

  .cal-week-cell {
    border-right: 1px solid var(--color-border-light);
    border-bottom: 1px solid var(--color-border-light);
    min-height: 40px;
    padding: 1px;
    position: relative;
    cursor: pointer;
    transition: background-color var(--transition-fast);
  }

  .cal-week-cell:hover { background-color: var(--color-surface-sunken); }

  .cal-day-timeline {
    position: relative;
    min-height: 400px;
  }

  .cal-timeline-hour {
    display: flex;
    min-height: 48px;
    border-bottom: 1px solid var(--color-border-light);
  }

  .cal-timeline-label {
    width: 40px;
    font-size: 0.625rem;
    color: var(--color-text-muted);
    padding: var(--space-1) 2px;
    text-align: right;
    flex-shrink: 0;
  }

  .cal-timeline-slot {
    flex: 1;
    position: relative;
    cursor: pointer;
    transition: background-color var(--transition-fast);
  }

  .cal-timeline-slot:hover { background-color: var(--color-surface-sunken); }

  .cal-timeline-event {
    position: absolute;
    left: 2px;
    right: 2px;
    padding: 2px var(--space-1);
    border-radius: var(--radius-sm);
    font-size: var(--text-xs);
    font-weight: var(--weight-medium);
    overflow: hidden;
    cursor: pointer;
    z-index: 1;
    transition: box-shadow var(--transition-fast);
  }

  .cal-timeline-event:hover { box-shadow: var(--shadow-md); }


  /* ============================================
     TABLET (640px+)
     ============================================ */

  @media (min-width: 640px) {
    .dash-greeting {
      padding: var(--space-4) var(--space-5);
      background: linear-gradient(135deg, color-mix(in srgb, var(--color-highlight) 8%, var(--color-surface-raised)), var(--color-surface-raised));
      border: 1px solid color-mix(in srgb, var(--color-highlight) 12%, transparent);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-sm);
      margin-bottom: var(--space-4);
    }

    .dash-greeting-msg { font-size: var(--text-xl); }

    .dash-greeting-sub { font-size: var(--text-sm); }

    .dash-greeting-time { font-size: var(--text-2xl); }

    .dash-metrics-track {
      margin-bottom: var(--space-4);
    }

    .dashboard-metrics {
      grid-template-columns: repeat(4, 1fr);
      gap: var(--space-3);
    }

    .metric-card {
      gap: var(--space-3);
      padding: var(--space-3) var(--space-4);
    }

    .metric-icon { width: 40px; height: 40px; border-radius: var(--radius-lg); }
    .metric-icon svg { width: 20px; height: 20px; }
    .metric-value { font-size: var(--text-2xl); }
    .metric-label { font-size: var(--text-xs); margin-top: var(--space-1); }

    .dash-share-bar {
      padding: var(--space-3) var(--space-4);
      margin-bottom: var(--space-4);
    }

    .dash-share-info { font-size: var(--text-sm); }

    .calendar-toolbar {
      padding: var(--space-3) var(--space-4);
      gap: var(--space-3);
    }

    .calendar-current-label {
      font-size: var(--text-lg);
      order: 0;
      flex-basis: auto;
      text-align: center;
    }

    .cal-view-btn {
      padding: var(--space-1) var(--space-3);
      font-size: var(--text-sm);
    }

    .calendar-body { min-height: 420px; padding: var(--space-2); }

    .cal-day { min-height: 72px; padding: var(--space-1) var(--space-2); }

    .cal-day-header { padding: var(--space-2); font-size: var(--text-xs); }

    .cal-day-number { font-size: var(--text-sm); width: 26px; height: 26px; }

    .cal-event {
      font-size: 0.6875rem;
      padding: 1px var(--space-1);
      height: auto;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.4;
      border-radius: 3px;
    }

    .cal-event-pending    { background: var(--status-pending-bg); color: var(--status-pending); }
    .cal-event-confirmed  { background: var(--status-confirmed-bg); color: var(--status-confirmed); }
    .cal-event-cancelled  { background: var(--status-cancelled-bg); color: var(--status-cancelled); }
    .cal-event-completed  { background: var(--status-completed-bg); color: var(--status-completed); }
    .cal-event-no_show    { background: var(--status-no-show-bg); color: var(--status-no-show); }

    .cal-week-grid {
      grid-template-columns: 56px repeat(7, 1fr);
      min-height: 560px;
    }

    .cal-week-time {
      font-size: var(--text-xs);
      padding: var(--space-1) var(--space-2);
      height: 48px;
    }

    .cal-week-cell { min-height: 48px; }

    .cal-day-timeline { min-height: 560px; }
    .cal-timeline-hour { min-height: 56px; }
    .cal-timeline-label { width: 56px; font-size: var(--text-xs); padding: var(--space-1) var(--space-2); }
    .cal-timeline-event { left: 4px; right: 4px; padding: var(--space-1) var(--space-2); }
  }


  /* ============================================
     DESKTOP (1024px+)
     ============================================ */

  @media (min-width: 1024px) {
    .dash-greeting {
      padding: var(--space-5) var(--space-6);
      margin-bottom: var(--space-5);
    }

    .dash-greeting-msg { font-size: var(--text-2xl); letter-spacing: -0.03em; }
    .dash-greeting-time { font-size: var(--text-3xl); }

    .metric-card {
      gap: var(--space-4);
      padding: var(--space-4) var(--space-5);
      transition: box-shadow var(--transition-fast), transform var(--transition-fast);
    }

    .metric-card:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-1px);
    }

    .metric-icon { width: 44px; height: 44px; }
    .metric-icon svg { width: 22px; height: 22px; }

    .dash-share-bar { margin-bottom: var(--space-5); }

    .calendar-toolbar { padding: var(--space-4) var(--space-5); }
    .calendar-body { min-height: 480px; }
    .cal-day { min-height: 80px; }

    .cal-week-grid { grid-template-columns: 60px repeat(7, 1fr); min-height: 600px; }
    .cal-week-time { height: 48px; }
    .cal-day-timeline { min-height: 600px; }
    .cal-timeline-hour { min-height: 60px; }
    .cal-timeline-label { width: 60px; }
  }
</style>

<script>
  (function () {
    const user = Auth.getUser();
    if (user) {
      if (user.theme) App.setTheme(user.theme);

      const avatarHtml = getInitials(user.name);
      document.getElementById('sidebar-avatar').textContent = avatarHtml;
      document.getElementById('header-avatar').textContent = avatarHtml;
      document.getElementById('sidebar-username').textContent = user.name || '';
      document.getElementById('sidebar-role').textContent = user.role || '';
      document.getElementById('lang-btn').textContent = i18n.getLocale().toUpperCase();

      // Greeting
      var hour = new Date().getHours();
      var greeting = hour < 12 ? 'Buenos dias' : hour < 18 ? 'Buenas tardes' : 'Buenas noches';
      var firstName = (user.name || '').split(' ')[0];
      document.getElementById('dash-greeting-msg').textContent = greeting + ', ' + firstName;

      var now = new Date();
      var dayNames = ['Domingo','Lunes','Martes','Miercoles','Jueves','Viernes','Sabado'];
      var monthNames = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
      document.getElementById('dash-greeting-sub').textContent = dayNames[now.getDay()] + ', ' + now.getDate() + ' de ' + monthNames[now.getMonth()] + ' ' + now.getFullYear();

      function updateClock() {
        var el = document.getElementById('dash-greeting-time');
        if (!el) { clearInterval(clockTimer); return; }
        var t = new Date();
        var h = t.getHours();
        var m = String(t.getMinutes()).padStart(2, '0');
        var ampm = h >= 12 ? 'PM' : 'AM';
        h = h % 12 || 12;
        el.textContent = h + ':' + m + ' ' + ampm;
      }
      updateClock();
      var clockTimer = setInterval(updateClock, 30000);

      if (user.role === 'owner' || user.role === 'admin') {
        const provLink = document.querySelector('.sidebar-link-providers');
        if (provLink) provLink.style.display = '';
      }

      if (user.plan && user.plan !== 'Standard') {
        var reportLink = document.querySelector('.sidebar-link-reports');
        if (reportLink) reportLink.style.display = '';
      }

      // Provider role: hide sidebar items they don't need
      if (user.role === 'provider') {
        ['services', 'providers', 'settings', 'reports'].forEach(function(page) {
          var link = document.querySelector('.sidebar-link[href="/' + page + '"]');
          if (link) link.style.display = 'none';
        });
        var sectionLabel = document.querySelector('.sidebar-section-label');
        if (sectionLabel) sectionLabel.style.display = 'none';
      }
    }

    // Share booking link
    function generateRef() {
      var chars = 'ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789';
      var ref = '';
      for (var i = 0; i < 6; i++) ref += chars.charAt(Math.floor(Math.random() * chars.length));
      return ref;
    }

    var currentBookingUrl = '';
    function buildBookingUrl() {
      var ref = generateRef();
      var url = window.location.origin + '/agendar/' + (user.slug || '') + '?ref=' + ref;
      if (user.role === 'provider' && user.provider_id) {
        url += '&prestador=' + user.provider_id;
      }
      currentBookingUrl = url;
      return currentBookingUrl;
    }
    if (user) buildBookingUrl();

    var shareBtn = document.getElementById('btn-share-booking');
    if (shareBtn && user) {
      shareBtn.addEventListener('click', async function() {
        var url = currentBookingUrl || buildBookingUrl();
        try {
          if (navigator.share) {
            await navigator.share({ title: (user.business_name || 'Agenda tu cita'), text: 'Agenda tu cita en linea', url: url });
          } else {
            await navigator.clipboard.writeText(url);
            showToast('Link copiado', 'success');
          }
        } catch (e) {
          var input = document.createElement('input');
          input.value = url;
          document.body.appendChild(input);
          input.select();
          document.execCommand('copy');
          document.body.removeChild(input);
          showToast('Link copiado', 'success');
        }
      });
    }

    var refreshBtn = document.getElementById('btn-refresh-link');
    if (refreshBtn && user) {
      refreshBtn.addEventListener('click', function() {
        buildBookingUrl();
        refreshBtn.style.transform = 'rotate(360deg)';
        refreshBtn.style.transition = 'transform 0.4s ease';
        setTimeout(function() { refreshBtn.style.transform = ''; refreshBtn.style.transition = ''; }, 400);
        showToast('Nuevo link generado', 'success');
      });
    }

    // Exchange rate widget
    var currSymbols = {VES:'Bs.',COP:'$',MXN:'$',ARS:'$',PEN:'S/.',BRL:'R$',CLP:'$',UYU:'$',BOB:'Bs.',DOP:'RD$',EUR:'€',GBP:'£'};
    var bizCurrency = '';
    var currentRate = 0;
    var apiRates = {bcv: 0, paralelo: 0};

    async function loadExchangeRate() {
      var res = await Api.get('/business/profile');
      if (!res.success || !res.data) return;
      var b = res.data;
      bizCurrency = b.currency_code;
      if (!bizCurrency || bizCurrency === 'USD') return;

      var sym = currSymbols[bizCurrency] || bizCurrency;
      document.getElementById('dash-rate-bar').style.display = '';
      document.getElementById('dash-rate-currency').textContent = sym;

      // Fetch live rates from dolarapi
      if (bizCurrency === 'VES') {
        try {
          var apiRes = await fetch('https://ve.dolarapi.com/v1/dolares');
          var data = await apiRes.json();
          data.forEach(function(d) {
            if (d.fuente === 'oficial') apiRates.bcv = d.promedio || 0;
            if (d.fuente === 'paralelo') apiRates.paralelo = d.promedio || 0;
          });
        } catch(e) {}
      }

      // Load saved rate or use API
      var savedRate = parseFloat(b.exchange_rate) || 0;
      var source = document.getElementById('dash-rate-source');

      if (apiRates.bcv > 0) {
        currentRate = apiRates.bcv;
        source.value = 'bcv';
      } else if (savedRate > 1) {
        currentRate = savedRate;
        source.value = 'manual';
      }

      updateRateDisplay();
    }

    function updateRateDisplay() {
      var sym = currSymbols[bizCurrency] || bizCurrency;
      document.getElementById('dash-rate-result').textContent = '1 USD = ' + sym + ' ' + currentRate.toFixed(2);
      var usd = parseFloat(document.getElementById('dash-rate-usd').value) || 0;
      document.getElementById('dash-rate-local').textContent = (usd * currentRate).toFixed(2);
    }

    document.getElementById('dash-rate-source').addEventListener('change', function() {
      var v = this.value;
      if (v === 'bcv') currentRate = apiRates.bcv || currentRate;
      else if (v === 'paralelo') currentRate = apiRates.paralelo || currentRate;
      // manual: keep current
      updateRateDisplay();
    });

    document.getElementById('dash-rate-usd').addEventListener('input', updateRateDisplay);

    document.getElementById('btn-save-rate').addEventListener('click', async function() {
      if (currentRate <= 0) { showToast('No hay tasa disponible', 'error'); return; }
      var res = await Api.put('/business/profile', { exchange_rate: currentRate });
      if (res.success) {
        var sym = currSymbols[bizCurrency] || bizCurrency;
        showToast('Tasa guardada: 1 USD = ' + sym + ' ' + currentRate.toFixed(2), 'success');
      }
    });

    loadExchangeRate();
    loadDashboardMetrics();

    if (typeof Calendar !== 'undefined') {
      Calendar.init('calendar-body', {
        onEventClick: (id) => Router.navigate('/appointments?id=' + id),
        onSlotClick: (date) => Router.navigate('/appointments?action=new&date=' + date),
      });
    }

    const fabBtn = document.getElementById('fab-new-appointment');
    if (fabBtn) {
      fabBtn.addEventListener('click', () => {
        Router.navigate('/appointments?action=new');
      });
    }

    async function loadDashboardMetrics() {
      const res = await Api.get('/appointments?metrics=true');
      if (res.success && res.data) {
        const d = res.data;
        document.getElementById('metric-today').textContent = d.today || 0;
        document.getElementById('metric-pending').textContent = d.pending || 0;
        document.getElementById('metric-clients').textContent = d.total_clients || 0;
        document.getElementById('metric-revenue').textContent = formatCurrency(d.revenue || 0);
      }
    }
  })();
</script>
