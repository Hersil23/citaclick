    <footer class="site-footer" style="justify-content:center;padding:.75rem;font-size:.7rem;color:#B0B0CC">Desarrollado por <a href="https://www.herasi.dev" target="_blank" rel="noopener noreferrer" style="color:#B0B0CC">@herasi.dev</a></footer>

</div>

<style>
.login-page{display:flex;min-height:100dvh}
.login-visual{width:60%;background:#1A1A2E;color:#F0F0F8;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden}
.login-visual::before{content:'';position:absolute;inset:0;opacity:.06;background:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}
.login-visual-inner{position:relative;z-index:1;text-align:center;padding:2rem}
.login-visual-logo{display:flex;align-items:center;justify-content:center;gap:.75rem;margin-bottom:2.5rem}
.login-visual-wordmark{font-family:system-ui,sans-serif;font-size:1.75rem;letter-spacing:-.5px;color:#F0F0F8}
.login-visual-wordmark b{font-weight:700;color:#E8000D}
.login-visual-wordmark span{font-weight:500}
.login-visual-title{font-family:'Playfair Display',serif;font-size:clamp(1.75rem,3.5vw,2.625rem);font-weight:600;font-style:italic;color:#FFFFFF;margin-top:1.5rem;margin-bottom:0;max-width:320px;line-height:1.2;letter-spacing:-.02em;text-shadow:0 2px 20px rgba(0,0,0,.5)}
.login-visual-accent{display:block;width:48px;height:2px;background:#E8000D;border-radius:2px;margin:1rem auto 2rem}
.login-mini-cal{background:#16213E;border:1px solid rgba(255,255,255,.06);border-radius:10px;overflow:hidden;max-width:280px;margin:0 auto;box-shadow:0 8px 32px rgba(0,0,0,.3);font-size:.7rem;color:#F0F0F8}

.login-mini-cal table{width:100%;border-collapse:collapse}
.login-mini-cal th{padding:4px;font-weight:600;opacity:.35;font-size:.6rem}
.login-mini-cal td{padding:5px 4px;text-align:center;font-size:.65rem;opacity:.45}
.login-mini-cal td.today{opacity:1;font-weight:700}
.login-mini-cal .mc-ev{display:block;margin:2px auto 0;padding:1px 4px;border-radius:3px;font-size:.55rem;font-weight:600;background:rgba(232,0,13,.2);color:#E8000D;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:90%}

.login-form-side{width:40%;background:#F8F8FA;display:flex;flex-direction:column;min-height:100dvh}
.login-form-topbar{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.5rem;flex-shrink:0}
.login-mobile-wordmark{font-family:system-ui,sans-serif;font-size:1.1rem;letter-spacing:-.5px;color:#1A1A2E}
.login-mobile-wordmark b{font-weight:700;color:#E8000D}
.login-mobile-wordmark span{font-weight:500}
.login-mobile-logo{display:flex;align-items:center;gap:.5rem}
.login-toggles{display:flex;gap:.5rem}
.lpill{display:flex;background:rgba(15,15,30,.08);border-radius:999px;padding:2px;gap:2px}
.lpill-opt{padding:4px 10px;font-size:.65rem;font-weight:700;border-radius:999px;letter-spacing:.04em;color:rgba(26,26,46,.4);transition:all .3s;white-space:nowrap;cursor:pointer;border:none;background:none}
.lpill-opt.active{background:#fff;color:#1A1A2E;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.lpill-opt:hover:not(.active){color:rgba(26,26,46,.6)}

.login-form-wrap{flex:1;display:flex;flex-direction:column;justify-content:center;padding:2rem clamp(1.5rem,4vw,3rem);max-width:400px;width:100%;margin:0 auto;animation:lf-enter .5s ease both}

.login-title{font-family:'Playfair Display',serif;font-size:1.75rem;font-weight:600;color:#1A1A2E;margin-bottom:.25rem;letter-spacing:-.02em}
.login-subtitle{font-size:.875rem;color:#8888A0;margin-bottom:2rem}
.lf-group{margin-bottom:1.25rem}
.lf-label{display:block;font-size:.75rem;font-weight:600;color:#4A4A68;margin-bottom:.375rem}
.lf-input-wrap{display:flex;align-items:center;background:#fff;border:1.5px solid #D8D8E4;border-radius:10px;transition:border-color .2s,box-shadow .2s;overflow:hidden}
.lf-input-wrap:focus-within{border-color:#E8000D;box-shadow:0 0 0 3px rgba(232,0,13,.08)}
.lf-icon{width:18px;height:18px;margin-left:12px;color:#8888A0;flex-shrink:0}
.lf-input{flex:1;border:none;background:none;padding:11px 12px;font-size:.875rem;color:#1A1A2E;outline:none}

.lf-eye{display:flex;align-items:center;justify-content:center;width:36px;height:36px;color:#8888A0;transition:color .15s;flex-shrink:0}
.lf-eye:hover{color:#1A1A2E}
.lf-eye svg{width:18px;height:18px}
.lf-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;font-size:.8125rem}
.lf-check{display:flex;align-items:center;gap:.4rem;color:#4A4A68;cursor:pointer}
.lf-check input{accent-color:#E8000D;width:16px;height:16px}
.lf-forgot{color:#E8000D;font-weight:500;transition:opacity .15s}
.lf-forgot:hover{opacity:.7}
.lf-error{font-size:.75rem;color:#EF4444;margin-bottom:.75rem;min-height:1rem}
.lf-btn-primary{width:100%;padding:12px;background:#E8000D;color:#fff;font-weight:600;font-size:.9375rem;border-radius:10px;border:none;cursor:pointer;transition:transform .15s,box-shadow .15s}
.lf-btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(232,0,13,.3)}

.lf-btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
.lf-divider{display:flex;align-items:center;gap:1rem;margin:1.5rem 0;color:#B0B0CC;font-size:.8125rem}
.lf-divider::before,.lf-divider::after{content:'';flex:1;height:1px;background:#E8E8F0}
.lf-btn-social{width:100%;padding:11px;border-radius:10px;font-size:.875rem;font-weight:500;display:flex;align-items:center;justify-content:center;gap:.6rem;cursor:pointer;transition:transform .15s,box-shadow .15s;margin-bottom:.625rem;border:none}
.lf-btn-social:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.08)}
.lf-btn-google{background:#fff;border:1.5px solid #D8D8E4;color:#333}
.lf-btn-whatsapp{background:#25D366;color:#fff}
.lf-switch{text-align:center;font-size:.8125rem;color:#8888A0;margin-top:1.75rem}
.lf-switch a{color:#E8000D;font-weight:600}
@media(max-width:767px){
  .login-page{flex-direction:column}
  .login-visual{display:none}
  .login-form-side{width:100%}
}
@media(prefers-reduced-motion:reduce){.login-form-wrap{animation:none}}
</style>

<script>
(function(){
var LT={
es:{visual_title:'Tu agenda te espera',title:'Bienvenido',subtitle:'Inicia sesi\u00f3n en tu cuenta',email_label:'Correo electr\u00f3nico',pass_label:'Contrase\u00f1a',remember:'Recordarme',forgot:'\u00bfOlvidaste tu contrase\u00f1a?',login_btn:'Iniciar sesi\u00f3n',or_with:'o contin\u00faa con',google_btn:'Continuar con Google',phone_btn:'Continuar con tel\u00e9fono',no_account:'\u00bfNo tienes cuenta? ',register_link:'Reg\u00edstrate gratis',error_required:'Email y contrase\u00f1a son requeridos',error_invalid:'Credenciales incorrectas'},
en:{visual_title:'Your schedule awaits',title:'Welcome back',subtitle:'Sign in to your account',email_label:'Email address',pass_label:'Password',remember:'Remember me',forgot:'Forgot password?',login_btn:'Sign in',or_with:'or continue with',google_btn:'Continue with Google',phone_btn:'Continue with phone',no_account:"Don't have an account? ",register_link:'Sign up free',error_required:'Email and password are required',error_invalid:'Invalid credentials'}
};
var lang=localStorage.getItem('citaclick-lang')||(navigator.language||'es').slice(0,2);
if(lang!=='en')lang='es';

function applyLT(){
  document.querySelectorAll('[data-lt]').forEach(function(el){
    var k=el.getAttribute('data-lt');
    if(LT[lang]&&LT[lang][k]){
      if(el.tagName==='INPUT')el.placeholder=LT[lang][k];
      else if(el.querySelector('a[data-lt]')){
        var a=el.querySelector('a[data-lt]');
        el.firstChild.textContent=LT[lang][k];
        a.textContent=LT[lang][a.getAttribute('data-lt')];
      } else el.textContent=LT[lang][k];
    }
  });
  document.querySelectorAll('#login-lang-pill .lpill-opt').forEach(function(b){b.classList.toggle('active',b.dataset.val===lang);});
  buildMiniCal();
}

var langPill=document.getElementById('login-lang-pill');
if(langPill){
  langPill.querySelectorAll('.lpill-opt').forEach(function(btn){
    btn.addEventListener('click',function(){
      lang=this.dataset.val;
      localStorage.setItem('citaclick-lang',lang);
      applyLT();
    });
  });
}

function buildMiniCal(){
  var el=document.getElementById('login-mini-cal');if(!el)return;el.textContent='';
  var now=new Date(),y=now.getFullYear(),m=now.getMonth(),td=now.getDate();
  var days=new Date(y,m+1,0).getDate(),first=(new Date(y,m,1).getDay()||7);
  var loc=lang==='es'?'es-ES':'en-US';
  var mn=now.toLocaleDateString(loc,{month:'long'});mn=mn.charAt(0).toUpperCase()+mn.slice(1);
  var dh=lang==='es'?['L','M','X','J','V','S','D']:['M','T','W','T','F','S','S'];
  var events={};events[td]='9:00 Corte';events[Math.min(td+2,days)]='2:00 Consulta';events[Math.max(td-1,1)]='11:00 Color';
  var hdr=document.createElement('div');hdr.className='mc-hdr';hdr.textContent=mn+' '+y;el.appendChild(hdr);
  var tbl=document.createElement('table'),tr=document.createElement('tr');
  dh.forEach(function(d){var th=document.createElement('th');th.textContent=d;tr.appendChild(th);});
  tbl.appendChild(tr);tr=document.createElement('tr');
  for(var i=1;i<first;i++)tr.appendChild(document.createElement('td'));
  for(var d=1;d<=days;d++){
    var cell=document.createElement('td');if(d===td)cell.className='today';
    var dn=document.createElement('div');dn.textContent=d;cell.appendChild(dn);
    if(events[d]){var ev=document.createElement('div');ev.className='mc-ev';ev.textContent=events[d];cell.appendChild(ev);}
    tr.appendChild(cell);if((first-1+d)%7===0&&d<days){tbl.appendChild(tr);tr=document.createElement('tr');}
  }
  tbl.appendChild(tr);el.appendChild(tbl);
}

document.getElementById('l-eye').addEventListener('click',function(){
  var inp=document.getElementById('l-pass');
  inp.type=inp.type==='password'?'text':'password';
});

document.getElementById('login-form').addEventListener('submit',async function(e){
  e.preventDefault();
  var errEl=document.getElementById('l-error');errEl.textContent='';
  var email=document.getElementById('l-email').value.trim();
  var pass=document.getElementById('l-pass').value;
  if(!email||!pass){errEl.textContent=LT[lang].error_required;return;}
  var btn=document.getElementById('l-submit');btn.disabled=true;btn.textContent='...';
  var res=await Auth.login(email,pass);
  if(res.success){Router.navigate('/dashboard');}
  else{errEl.textContent=res.message||LT[lang].error_invalid;btn.disabled=false;btn.textContent=LT[lang].login_btn;}
});

document.getElementById('l-google').addEventListener('click',function(){Auth.loginWithGoogle();});
document.getElementById('l-phone').addEventListener('click',function(){Router.navigate('/login?method=phone');});

applyLT();
})();
</script>
