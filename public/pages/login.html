<div class="auth-page">
  <div class="auth-container">
    <div class="auth-logo">
      <div class="auth-logo-icon" id="login-logo-icon"></div>
      <span class="auth-logo-text text-display">cita<span class="auth-logo-accent">click</span></span>
    </div>

    <form class="auth-form" id="login-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="login-email" data-i18n="auth.email">Correo electronico</label>
        <input class="form-input" type="email" id="login-email" data-i18n-placeholder="auth.email" placeholder="Correo electronico" required autocomplete="email">
      </div>

      <div class="form-group">
        <label class="form-label" for="login-password" data-i18n="auth.password">Contrasena</label>
        <input class="form-input" type="password" id="login-password" data-i18n-placeholder="auth.password" placeholder="Contrasena" required autocomplete="current-password">
      </div>

      <div class="form-group" style="align-items:flex-end;">
        <a href="#" class="text-sm" style="color:var(--color-highlight);" data-i18n="auth.forgot_password">Olvidaste tu contrasena?</a>
      </div>

      <div id="login-error" class="form-error" style="display:none;text-align:center;margin-bottom:var(--space-3);"></div>

      <button type="submit" class="btn btn-primary btn-full btn-lg" data-i18n="auth.login">Iniciar sesion</button>

      <div class="form-divider" data-i18n="auth.or_continue_with">o continua con</div>

      <button type="button" class="btn btn-secondary btn-full" id="btn-google" style="gap:var(--space-3);">
        <svg width="20" height="20" viewBox="0 0 24 24">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        <span data-i18n="auth.continue_google">Continuar con Google</span>
      </button>

      <button type="button" class="btn btn-secondary btn-full mt-2" id="btn-phone" style="gap:var(--space-3);">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="5" y="2" width="14" height="20" rx="2" ry="2"/>
          <line x1="12" y1="18" x2="12" y2="18"/>
        </svg>
        <span data-i18n="auth.continue_phone">Continuar con telefono</span>
      </button>
    </form>

    <p class="auth-switch text-sm text-center mt-6">
      <span data-i18n="auth.no_account">No tienes cuenta?</span>
      <a href="/register" data-link style="color:var(--color-highlight);font-weight:var(--weight-semibold);" data-i18n="auth.register">Crear cuenta</a>
    </p>
  </div>

  <footer class="site-footer">
    Desarrollado por <a href="https://www.herasi.dev" target="_blank" rel="noopener noreferrer">@herasi.dev</a>
  </footer>
</div>

<style>
  .auth-page {
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: var(--space-4);
    background-color: var(--color-surface);
  }

  .auth-container {
    width: 100%;
    max-width: 400px;
  }

  .auth-logo {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: var(--space-3);
    margin-bottom: var(--space-8);
  }

  .auth-logo-text {
    font-size: var(--text-3xl);
    color: var(--color-text);
    letter-spacing: -0.5px;
  }

  .auth-logo-accent {
    color: var(--color-highlight);
    font-weight: var(--weight-bold);
  }

  .auth-form {
    background-color: var(--color-surface-raised);
    border: 1px solid var(--color-border-light);
    border-radius: var(--radius-xl);
    padding: var(--space-6);
    box-shadow: var(--shadow-md);
  }

  .auth-switch {
    margin-top: var(--space-6);
    color: var(--color-text-secondary);
  }

  .auth-switch a {
    margin-left: var(--space-1);
  }

  .auth-page .site-footer {
    margin-top: auto;
    padding-top: var(--space-8);
  }
</style>

<script>
  (function() {
    const form = document.getElementById('login-form');
    const errorEl = document.getElementById('login-error');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.style.display = 'none';

      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;

      if (!email || !password) {
        errorEl.textContent = i18n.t('common.required_field');
        errorEl.style.display = 'block';
        return;
      }

      const btn = form.querySelector('button[type="submit"]');
      btn.disabled = true;
      btn.textContent = i18n.t('common.loading');

      const result = await Auth.login(email, password);

      if (result.success) {
        Router.navigate('/dashboard');
      } else {
        errorEl.textContent = result.message || i18n.t('errors.server');
        errorEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = i18n.t('auth.login');
      }
    });

    document.getElementById('btn-google').addEventListener('click', () => {
      Auth.loginWithGoogle();
    });

    document.getElementById('btn-phone').addEventListener('click', () => {
      Router.navigate('/login?method=phone');
    });
  })();
</script>
