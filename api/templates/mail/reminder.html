<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"></head>
<body style="margin:0;padding:0;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:#F5F5F5;">
<table width="100%" cellpadding="0" cellspacing="0" style="max-width:600px;margin:0 auto;background:#FFFFFF;">
  <tr><td style="background:#1A1A2E;padding:24px 32px;">
    <span style="font-size:22px;font-weight:700;color:#FFFFFF;letter-spacing:-.5px;">cita<span style="color:#E8000D;">click</span></span>
  </td></tr>
  <tr><td style="padding:32px;">
    <h1 style="font-size:20px;color:#1A1A2E;margin:0 0 8px;">Recordatorio de cita</h1>
    <p style="font-size:14px;color:#666;margin:0 0 24px;line-height:1.6;">Hola {{client_name}}, te recordamos que tienes una cita proxima.</p>
    <table width="100%" cellpadding="8" cellspacing="0" style="border:1px solid #E8E8F0;border-radius:8px;font-size:14px;color:#333;">
      <tr style="background:#F8F8FA;"><td style="font-weight:600;width:140px;">Negocio</td><td>{{business_name}}</td></tr>
      <tr><td style="font-weight:600;">Servicio</td><td>{{service_name}}</td></tr>
      <tr style="background:#F8F8FA;"><td style="font-weight:600;">Fecha</td><td>{{date}}</td></tr>
      <tr><td style="font-weight:600;">Hora</td><td>{{start_time}}</td></tr>
    </table>
    <p style="font-size:13px;color:#999;margin:24px 0 0;line-height:1.5;">Te esperamos. Si no puedes asistir, avisa con anticipacion.</p>
  </td></tr>
  <tr><td style="background:#F8F8FA;padding:16px 32px;text-align:center;font-size:12px;color:#999;border-top:1px solid #E8E8F0;">
    CitaClick &mdash; citaclick.net
  </td></tr>
</table>
</body>
</html>
